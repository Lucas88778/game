<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Roguelike 生存：極限試煉 v7.30 (獨立鎖定版)</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background-color: #222;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: white;
        touch-action: none;
    }
    canvas { display: block; }

    #ui-layer {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
    }

    .panel {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.88);
        padding: 30px;
        border-radius: 10px;
        border: 2px solid #555;
        text-align: center;
        pointer-events: auto;
        width: 88%;
        max-width: 560px;
        box-sizing: border-box;
    }

    .btn {
        display: inline-block;
        background: #4CAF50;
        color: white;
        padding: 10px 20px;
        margin: 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        transition: background 0.3s;
        box-sizing: border-box;
    }
    .btn:hover { background: #45a049; }

    .btn-start {
        width: 100px;
        height: 100px;
        margin: 10px 5px;
        padding: 10px 5px;
        display: inline-flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        vertical-align: top;
    }
    .btn-start .emoji {
        font-size: 28px;
        margin-bottom: 8px;
    }

    .btn-upgrade {
        background: #2196F3;
        width: 100%;
        margin: 10px 0;
        display: block;
        font-weight: bold;
        font-size: 20px;
        padding: 15px;
        white-space: pre-wrap;
        line-height: 1.4;
    }
    .btn-upgrade:hover { background: #1976D2; }

    .btn-special {
        background: #ff9800;
        text-shadow: 1px 1px 2px black;
    }
    .btn-special:hover { background: #e68a00; }

    #exp-bar-container {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        height: 20px;
        background: #333;
        border-radius: 10px;
        border: 2px solid #777;
    }

    #exp-bar {
        height: 100%;
        width: 0%;
        background: #4CAF50;
        border-radius: 8px;
        transition: width 0.2s;
    }

    #status {
        position: absolute;
        top: 38px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 18px;
        text-shadow: 1px 1px 2px black;
        text-align: center;
        white-space: pre-line;
    }

    #summon-count-row {
        position: absolute;
        top: 66px;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 16px;
        text-shadow: 1px 1px 2px black;
    }

    .summon-count {
        background: rgba(0, 0, 0, 0.35);
        padding: 4px 10px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.18);
        min-width: 92px;
        text-align: center;
    }

    .hidden { display: none !important; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div id="exp-bar-container" class="hidden">
        <div id="exp-bar"></div>
    </div>
    <div id="status" class="hidden">進化等級: 0 / 10</div>

    <div id="summon-count-row" class="hidden">
        <div id="hound-count" class="summon-count">🐕 0/0</div>
        <div id="frog-count" class="summon-count">🐸 0/0</div>
    </div>

    <div id="start-screen" class="panel">
        <h2>Roguelike 生存試煉</h2>
        <p>請選擇你的初始技能：</p>
        <button class="btn btn-start" onclick="startGame('missile')">
            <span class="emoji">🌟</span>追蹤魔彈
        </button>
        <button class="btn btn-start" onclick="startGame('frost')">
            <span class="emoji">❄️</span>冰霜法環
        </button>
        <button class="btn btn-start" onclick="startGame('summon')">
            <span class="emoji">🐸</span>召喚法術
        </button>
    </div>

    <div id="upgrade-screen" class="panel hidden">
        <h2 id="upgrade-title" style="white-space: pre-wrap; font-size: 18px; line-height: 1.4;">技能強化！</h2>
        <div id="upgrade-options"></div>
    </div>

    <div id="game-over-screen" class="panel hidden">
        <h2 id="end-title">遊戲結束</h2>
        <button class="btn" onclick="location.reload()">重新開始</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameState = 'start';
let keys = {};
let frameCount = 0;
let normalKillCount = 0;
let confettis = [];

let enemies = [];
let gems = [];
let healDrops = [];
let projectiles = [];
let effects = [];
let damageTexts = [];
let summons = [];
let tethers = [];

let level10Frames = 0;
let bossIsDead = false;

const player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    size: 15,
    speed: 4,
    hp: 100,
    maxHp: 100,
    exp: 0,
    nextExp: 5,
    level: 0,
    skill: null,
    skillStats: {}
};

const joystick = {
    active: false,
    startX: 0,
    startY: 0,
    currentX: 0,
    currentY: 0,
    maxRadius: 50
};

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

const skillDefinitions = {
    missile: {
        id: 'missile',
        name: '追蹤魔彈',
        cooldown: 45,
        currentCooldown: 0,
        count: 1,
        speed: 5,
        damage: 18, // 基礎傷害改為 18
        size: 12,
        splitCount: 0,
        isSpecial: false,
        upgrades: [
            { id: 'u1', desc: '追蹤魔彈+1', apply: (s) => s.count += 1 },
            { id: 'u2', desc: '攻速增加', apply: (s) => s.cooldown = (player.level === 10) ? Math.max(2, s.cooldown - 10) : Math.max(10, s.cooldown - 10) },
            { id: 'u3', desc: '擊中後分裂 (分裂數量增加)', apply: (s) => s.splitCount += 3 }
        ],
        specialUpgrade: {
            id: 's1',
            desc: '超級強化：魔力爆發 (傷害 200%)',
            apply: (s) => { s.damage *= 2.0; s.isSpecial = true; }
        }
    },
    frost: {
        id: 'frost',
        name: '冰霜法環',
        cooldown: 120,
        currentCooldown: 0,
        radius: 40,
        duration: 60,
        damage: 50,
        isSpecial: false,
        upgrades: [
            { id: 'u1', desc: '擴大法環半徑', apply: (s) => s.radius += 30 },
            { id: 'u2', desc: '增加發動頻率\n(無限縮短)', apply: (s) => s.cooldown = Math.max(1, s.cooldown - 10) },
            { id: 'u3', desc: '增加冰環停留時間', apply: (s) => s.duration += 24 }
        ],
        specialUpgrade: {
            id: 's1',
            desc: '超級強化：絕對零度',
            apply: (s) => s.isSpecial = true
        }
    },
    summon: {
        id: 'summon',
        name: '召喚法術',
        isSpecial: false,
        currentTetherTarget: null,
        houndSpawnTimer: 0,
        tetherSlow: 0.15,
        pathTiers: { a: 0, b: 0, c: 0 },
        upgrades: [],
        specialUpgrade: {
            id: 's1',
            desc: '🐸獲得毒圈+\n受擊時🐕衝刺並造成暈眩',
            apply: (s) => {
                s.isSpecial = true;
                recalcSummonStats(s);
                refreshExistingSummons();
            }
        }
    }
};

function recalcSummonStats(s) {
    const a = Math.min(s.pathTiers.a, 8);
    const b = Math.min(s.pathTiers.b, 8);
    const c = s.pathTiers.c; 

    let passiveHounds = 0;
    let passiveHoundSpawnRed = 0;
    let passiveFrogs = 0;
    let passiveFrogConvRed = 0;

    if (player.level >= 1) passiveHoundSpawnRed += 30; 
    if (player.level >= 2) passiveFrogConvRed += 45;   
    if (player.level >= 3) passiveHounds += 1;         
    if (player.level >= 4) passiveFrogs += 1;          
    if (player.level >= 5) passiveHounds += 1;         
    if (player.level >= 6) passiveFrogs += 1;          
    if (player.level >= 10) {
        passiveHounds += 2; 
        passiveFrogs += 1;  
    }

    s.maxHounds = 1 + passiveHounds + c;
    s.maxFrogs = 2 + passiveFrogs + c;
    
    s.spawnInterval = Math.max(15, 240 - passiveHoundSpawnRed - (c * 22)); 
    s.tetherDuration = Math.max(15, 360 - passiveFrogConvRed - (c * 28)); 

    let levelAtkBonus = player.level * 1.25;
    let levelHpBonus = player.level * 10; 

    s.houndHp = 120 + (a * 25); 
    s.houndAtk = 5 + levelAtkBonus + (a * 3); 
    s.houndAttackInterval = Math.max(10, 30 - (a * 1.5)); 
    s.houndBaseSpeed = 3.5 + (a * 0.4); 
    
    s.houndCritChance = 0.10;
    s.houndCritMultiplier = 2.5; 
    
    s.frogHp = 125 + levelHpBonus + (b * 30); 
    s.frogAtk = 4 + (b * 2);
    s.frogAttackInterval = 30; 
    s.frogBaseSpeed = 3.35;

    s.poisonRadius = 110 + (b * 3); 
    s.poisonInterval = 20; 
    s.poisonDamage = 2 + (b * 1.5); 

    s.summonDamageReduction = 0;
}

function healExistingSummonsByRatio(ratio) {
    summons.forEach(sum => {
        if (sum.hp > 0) {
            sum.hp = Math.min(sum.maxHp, sum.hp + sum.maxHp * ratio);
        }
    });
}

function refreshExistingSummons() {
    if (player.skill !== 'summon') return;
    summons.forEach(sum => sum.refreshStats());
}

function applySummonUpgrade(pathKey) {
    const s = player.skillStats;
    if (pathKey !== 'c' && s.pathTiers[pathKey] >= 8) return false;
    s.pathTiers[pathKey] += 1;
    recalcSummonStats(s);
    refreshExistingSummons();
    healExistingSummonsByRatio(0.25);
    return true;
}

function getSummonUpgradeLabel(pathKey) {
    if (pathKey === 'a') return '🐕獵犬強化';
    if (pathKey === 'b') return '🐸 青蛙強化';
    if (pathKey === 'c') return '加快施法及上限+1';
    return '';
}

function updateSummonCountUI() {
    const row = document.getElementById('summon-count-row');
    if (player.skill !== 'summon' || gameState === 'start') {
        row.classList.add('hidden');
        return;
    }

    row.classList.remove('hidden');

    const houndCount = summons.filter(s => s.type === 'hound' && !s.isSpawning).length;
    const frogCount = summons.filter(s => s.type === 'frog' && !s.isSpawning).length;

    document.getElementById('hound-count').innerText = `🐕 ${houndCount}/${player.skillStats.maxHounds}`;
    document.getElementById('frog-count').innerText = `🐸 ${frogCount}/${player.skillStats.maxFrogs}`;
}

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

canvas.addEventListener('touchstart', e => {
    if (gameState !== 'playing') return;
    e.preventDefault();
    const touch = e.changedTouches[0];
    joystick.active = true;
    joystick.startX = touch.clientX;
    joystick.startY = touch.clientY;
    joystick.currentX = touch.clientX;
    joystick.currentY = touch.clientY;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
    if (!joystick.active) return;
    e.preventDefault();
    const touch = e.changedTouches[0];
    joystick.currentX = touch.clientX;
    joystick.currentY = touch.clientY;
}, { passive: false });

const stopJoystick = () => joystick.active = false;
canvas.addEventListener('touchend', stopJoystick);
canvas.addEventListener('touchcancel', stopJoystick);

function startGame(skillId) {
    player.skill = skillId;
    player.skillStats = JSON.parse(JSON.stringify(skillDefinitions[skillId]));
    player.skillStats.upgrades = skillDefinitions[skillId].upgrades;
    player.skillStats.specialUpgrade = skillDefinitions[skillId].specialUpgrade;

    if (skillId === 'summon') {
        recalcSummonStats(player.skillStats);
    }

    player.x = canvas.width / 2;
    player.y = canvas.height / 2;
    player.hp = player.maxHp;
    player.level = 0;
    player.exp = 0;
    player.nextExp = 5;

    normalKillCount = 0;
    enemies = [];
    gems = [];
    healDrops = [];
    projectiles = [];
    effects = [];
    damageTexts = [];
    summons = [];
    tethers = [];

    level10Frames = 0;
    bossIsDead = false;

    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('exp-bar-container').classList.remove('hidden');
    document.getElementById('status').classList.remove('hidden');
    document.getElementById('upgrade-title').style.fontSize = "18px";

    updateUI();
    updateSummonCountUI();

    gameState = 'playing';
    requestAnimationFrame(gameLoop);
}

function triggerHoundRevenge(aggressor) {
    if (player.skill !== 'summon') return;
    if (!player.skillStats.isSpecial) return; 
    
    for (let i = 0; i < summons.length; i++) {
        let s = summons[i];
        if (s.type === 'hound' && !s.isSpawning && s.hp > 0) {
            s.isDashing = true;
            s.isJumping = false; 
            s.dashTimer = 15; 
            s.target = aggressor;
            aggressor.tauntedBy = s; 
            s.attackCooldown = 0; 
            s.trail = []; 
        }
    }
}

class DamageText {
    constructor(x, y, damage, color, isCrit = false) {
        this.x = x + (Math.random() - 0.5) * 30;
        this.y = y + (Math.random() - 0.5) * 10;
        this.damage = Math.round(damage);
        this.color = color;
        this.isCrit = isCrit;
        
        this.life = isCrit ? 45 : 35;
        this.maxLife = this.life;
        this.vy = -1.5 - Math.random();
    }
    update() {
        this.y += this.vy;
        this.life--;
        return this.life > 0;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.life / this.maxLife;
        ctx.fillStyle = this.color;
        
        if (this.isCrit) {
            ctx.font = 'bold 24px Arial';
            this.displayText = `${this.damage}!`;
        } else {
            ctx.font = 'bold 18px Arial';
            this.displayText = `${this.damage}`;
        }
        
        ctx.textAlign = 'center';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.strokeText(this.displayText, this.x, this.y);
        ctx.fillText(this.displayText, this.x, this.y);
        ctx.restore();
    }
}

class TransformPoof {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.life = 15;
        this.maxLife = 15;
        this.radius = 5;
    }
    update() {
        this.radius += 2.5;
        this.life--;
        return this.life > 0;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.life / this.maxLife;
        ctx.fillStyle = '#8BC34A';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

class GroundCrack {
    constructor(x, y, radius) {
        this.x = x;
        this.y = y;
        this.radius = radius;
        this.life = 45; 
        this.maxLife = 45;
        
        this.segments = [];
        let numCracks = 6 + Math.floor(Math.random() * 3);
        for (let i = 0; i < numCracks; i++) {
            let angle = (Math.PI * 2 / numCracks) * i + (Math.random() - 0.5);
            let length = radius * (0.7 + Math.random() * 0.3);
            
            let path = [{x: this.x, y: this.y}];
            let cx = this.x;
            let cy = this.y;
            for (let j = 1; j <= 3; j++) {
                let segLen = length / 3;
                cx += Math.cos(angle + (Math.random() - 0.5) * 0.8) * segLen;
                cy += Math.sin(angle + (Math.random() - 0.5) * 0.8) * segLen;
                path.push({x: cx, y: cy});
            }
            this.segments.push(path);
        }
    }
    update() {
        this.life--;
        return this.life > 0;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.life / this.maxLife; 
        const crackColor = '#6b3e20'; 

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.strokeStyle = crackColor;
        ctx.lineWidth = 2; 
        ctx.stroke();

        ctx.lineWidth = 3;
        ctx.beginPath();
        for (let path of this.segments) {
            ctx.moveTo(path[0].x, path[0].y);
            for (let j = 1; j < path.length; j++) {
                ctx.lineTo(path[j].x, path[j].y);
            }
        }
        ctx.stroke();
        ctx.restore();
    }
}

class Enemy {
    constructor(hpMult, type = 'normal') {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.max(canvas.width, canvas.height) / 2 + 50;
        this.x = player.x + Math.cos(angle) * dist;
        this.y = player.y + Math.sin(angle) * dist;
        this.type = type;

        let baseSpeed = 1.5 + Math.random() * 1;
        let hpScale = 1.2;
        if (player.level >= 5) {
            let progress = Math.min(4, player.level - 5) / 4;
            hpScale = 1.2 * (1 + 0.5 * progress);
        }

        if (type === 'boss') {
            this.size = 35;
            this.speed = 3.0;
            this.hp = 30 * hpMult * hpScale * 10.0;
            this.emoji = '👻';
        } else if (type === 'mini') {
            this.size = 18;
            this.speed = baseSpeed * 0.6;
            this.hp = 30 * hpMult * hpScale * 2.0;
            this.emoji = '👹';
        } else {
            this.size = 12 + Math.random() * 5;
            this.speed = baseSpeed;
            this.hp = 30 * hpMult * hpScale;
            this.emoji = '👾';
        }

        this.maxHp = this.hp;
        this.baseSpeed = this.speed;
        this.frozenTimer = 0;
        this.stunTimer = 0; 
        this.frostHitCount = 0;
        this.slowMultiplier = 1.0;
        this.tauntedBy = null;
        this.hasTriggeredRevenge = false; 

        this.isFading = false;
        this.fadeDuration = 45;
        this.fadeTimer = 0;
    }

    update() {
        if (this.isFading) return;

        if (this.stunTimer > 0) {
            this.stunTimer--;
            this.slowMultiplier = 1.0;
            return; 
        }

        if (this.frozenTimer > 0) {
            this.frozenTimer--;
            this.slowMultiplier = 1.0;
            return;
        }

        let targetX = player.x;
        let targetY = player.y;
        let targetHitDist = player.size + this.size;
        let targetObj = player;

        if (this.type !== 'boss' && this.tauntedBy && this.tauntedBy.hp > 0) {
            let sHitDist = this.size + this.tauntedBy.size;
            let sDx = this.tauntedBy.x - this.x;
            let sDy = this.tauntedBy.y - this.y;
            let sDistSq = sDx * sDx + sDy * sDy;

            if (sDistSq < (sHitDist * 1.3) * (sHitDist * 1.3)) {
                targetX = this.tauntedBy.x;
                targetY = this.tauntedBy.y;
                targetHitDist = sHitDist;
                targetObj = this.tauntedBy;
            }
        } else {
            this.tauntedBy = null;
        }

        const dx = targetX - this.x;
        const dy = targetY - this.y;
        const distSq = dx * dx + dy * dy;
        const dist = Math.sqrt(distSq) || 1;

        let actualSpeed = this.baseSpeed * this.slowMultiplier;

        if (distSq > (targetHitDist * 0.9) * (targetHitDist * 0.9)) {
            this.x += (dx / dist) * actualSpeed;
            this.y += (dy / dist) * actualSpeed;
        }

        this.slowMultiplier = 1.0;

        if (distSq < targetHitDist * targetHitDist) {
            if (targetObj === player) {
                player.hp -= 0.5;
                
                if (!this.hasTriggeredRevenge) {
                    this.hasTriggeredRevenge = true;
                    triggerHoundRevenge(this); 
                }

                if (player.hp <= 0) gameOver(false);
            } else {
                const reduction = targetObj.damageReduction || 0;
                const actualDamage = 0.5 * (1 - reduction);
                targetObj.hp -= actualDamage;
            }
        }

        if (this.type === 'boss') {
            for (let i = 0; i < summons.length; i++) {
                let sum = summons[i];
                if (sum.isSpawning || sum.hp <= 0) continue;
                
                if (sum.target === this) {
                    let sx = sum.x - this.x;
                    let sy = sum.y - this.y;
                    let sDistSq = sx * sx + sy * sy;
                    let sHitDist = this.size + sum.size;
                    if (sDistSq < sHitDist * sHitDist) {
                        const reduction = sum.damageReduction || 0;
                        sum.hp -= 0.5 * (1 - reduction);
                    }
                }
            }
        }
    }

    draw() {
        ctx.save();

        if (this.isFading) {
            ctx.globalAlpha = Math.max(0, 1 - (this.fadeTimer / this.fadeDuration));
        }

        if (this.frozenTimer > 0) {
            ctx.fillStyle = 'rgba(0, 255, 255, 0.4)';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 1.5, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.font = `${this.size * 2}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.emoji, this.x, this.y);
        
        if (this.stunTimer > 0) {
            ctx.font = `20px Arial`;
            ctx.fillText('💫', this.x, this.y - this.size - 10);
        }

        if (this.type === 'boss' && this.frostHitCount > 0) {
            ctx.font = `16px Arial`;
            let mark = this.frostHitCount === 1 ? '❄️' : '❄️❄️';
            ctx.fillText(mark, this.x, this.y - this.size - 8);
        }

        ctx.restore();
    }
}

class Summon {
    constructor(x, y, type, sourceEnemy = null) {
        this.x = x;
        this.y = y;
        this.type = type;
        this.size = 15;

        this.isSpawning = true;
        this.spawnTimer = 0;
        this.spawnDuration = 45;
        this.sourceEnemy = sourceEnemy;

        this.target = null;
        this.targetOffset = { x: 0, y: 0 };
        this.attackCooldown = 0;
        this.poisonTimer = 0;
        
        this.revengeCooldown = 0;
        this.isDashing = false;
        this.isJumping = false;
        this.jumpTimer = 0;
        this.visualYOffset = 0; 
        this.dashTimer = 0;
        this.trail = [];
        
        this.bubbles = [];

        this.emoji = this.type === 'hound' ? '🐕' : '🐸';
        this.refreshStats(true);
    }

    refreshStats(resetHp = false) {
        const s = player.skillStats;

        let newMaxHp, newAtk, newBaseSpeed, newAttackInterval, newReduction;

        if (this.type === 'hound') {
            newMaxHp = s.houndHp;
            newAtk = s.houndAtk;
            newBaseSpeed = s.houndBaseSpeed;
            newAttackInterval = s.houndAttackInterval;
            newReduction = s.summonDamageReduction;
        } else {
            newMaxHp = s.frogHp;
            newAtk = s.frogAtk;
            newBaseSpeed = s.frogBaseSpeed;
            newAttackInterval = s.frogAttackInterval;
            newReduction = s.summonDamageReduction;
        }

        const hpRatio = (this.maxHp && this.maxHp > 0) ? this.hp / this.maxHp : 1;

        this.maxHp = newMaxHp;
        this.atk = newAtk;
        this.baseSpeed = newBaseSpeed;
        this.attackInterval = newAttackInterval;
        this.damageReduction = newReduction;

        if (resetHp) {
            this.hp = this.maxHp;
        } else {
            this.hp = Math.max(1, Math.min(this.maxHp, Math.round(this.maxHp * hpRatio)));
        }

        this.attackCooldown = Math.min(this.attackCooldown, this.attackInterval);
    }

    update() {
        if (this.isSpawning) {
            this.spawnTimer++;
            if (this.sourceEnemy) this.sourceEnemy.fadeTimer = this.spawnTimer;
            if (this.spawnTimer >= this.spawnDuration) {
                this.isSpawning = false;
                if (this.sourceEnemy) {
                    this.sourceEnemy.hp = 0;
                    this.sourceEnemy.isFading = false;
                }
            }
            return true;
        }
        
        if (this.revengeCooldown > 0) this.revengeCooldown--;
        
        if (this.type === 'hound') {
            this.trail.push({x: this.x, y: this.y + this.visualYOffset});
            if (this.trail.length > 6) this.trail.shift();
        }

        if (this.isJumping) {
            this.jumpTimer--;
            this.visualYOffset = -25 * Math.sin(Math.PI * (1 - this.jumpTimer / 12));

            if (this.jumpTimer <= 0) {
                this.isJumping = false;
                this.visualYOffset = 0; 
                let stunRadius = 70; 
                
                effects.push(new GroundCrack(this.x, this.y, stunRadius));
                
                enemies.forEach(e => {
                    if (e.hp > 0 && !e.isFading && e.type !== 'boss') {
                        let dSq = (e.x - this.x)*(e.x - this.x) + (e.y - this.y)*(e.y - this.y);
                        if (dSq < stunRadius * stunRadius) {
                            e.stunTimer = 30; // 延長暈眩時間至 30 幀
                        }
                    }
                });
            }
            return this.hp > 0; 
        }

        if (this.isDashing) {
            this.dashTimer--;
            let dashSpeed = this.baseSpeed * 4; 
            
            if (this.target && this.target.hp > 0 && !this.target.isFading) {
                const dx = this.target.x - this.x;
                const dy = this.target.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy) || 1;
                
                if (dist > dashSpeed) {
                    this.x += (dx / dist) * dashSpeed;
                    this.y += (dy / dist) * dashSpeed;
                } else {
                    this.x = this.target.x;
                    this.y = this.target.y;
                    this.dashTimer = 0; 
                }
            } else {
                this.dashTimer = 0;
            }

            if (this.dashTimer <= 0) {
                this.isDashing = false;
                this.isJumping = true;
                this.jumpTimer = 12; 
            }
            return this.hp > 0; 
        }

        let currentSpeed = this.baseSpeed;

        if (this.type === 'frog' && player.skillStats.isSpecial) {
            this.poisonTimer++;
            if (this.poisonTimer >= player.skillStats.poisonInterval) {
                this.poisonTimer = 0;
                for (let i = 0; i < enemies.length; i++) {
                    let e = enemies[i];
                    if (e.hp <= 0 || e.isFading) continue;

                    const dx = e.x - this.x;
                    const dy = e.y - this.y;
                    if (dx * dx + dy * dy <= player.skillStats.poisonRadius * player.skillStats.poisonRadius) {
                        e.hp -= player.skillStats.poisonDamage;
                        damageTexts.push(new DamageText(
                            e.x, e.y, player.skillStats.poisonDamage, '#76FF03'
                        ));
                    }
                }
            }
            
            if (Math.random() < 0.15) { 
                let angle = Math.random() * Math.PI * 2;
                let dist = Math.random() * player.skillStats.poisonRadius * 0.8;
                let life = 20 + Math.random() * 20;
                this.bubbles.push({
                    x: Math.cos(angle) * dist,
                    dy: Math.sin(angle) * dist, 
                    r: 2 + Math.random() * 3,
                    life: life,
                    maxLife: life
                });
            }
            for (let i = this.bubbles.length - 1; i >= 0; i--) {
                this.bubbles[i].life--;
                this.bubbles[i].dy -= 0.6; 
                if (this.bubbles[i].life <= 0) this.bubbles.splice(i, 1);
            }
        }

        if (this.target && player.skillStats && this.target === player.skillStats.currentTetherTarget) {
            if (this.target.tauntedBy === this) this.target.tauntedBy = null;
            this.target = null;
        }

        if (!this.target || this.target.hp <= 0 || this.target.isFading) {
            this.target = null;
            let freeEnemies = [];
            let engagedEnemies = [];

            for (let i = 0; i < enemies.length; i++) {
                let e = enemies[i];
                const m = e.size + 10;
                let isTethered = player.skillStats && player.skillStats.currentTetherTarget === e;

                if (e.hp <= 0 || e.isFading || e.x < m || e.x > canvas.width - m || e.y < m || e.y > canvas.height - m || isTethered) continue;

                let targetingCount = summons.filter(s => s.target === e).length;

                if (targetingCount === 0) {
                    freeEnemies.push(e);
                } else {
                    engagedEnemies.push({ enemy: e, count: targetingCount });
                }
            }

            let closest = null;
            let minDistSq = Infinity;

            if (freeEnemies.length > 0) {
                for (let e of freeEnemies) {
                    const dSq = (e.x - this.x) * (e.x - this.x) + (e.y - this.y) * (e.y - this.y);
                    if (dSq < minDistSq) {
                        minDistSq = dSq;
                        closest = e;
                    }
                }
                if (closest) {
                    this.target = closest;
                    closest.tauntedBy = this;
                    this.targetOffset = { x: (this.size + closest.size) * 0.75, y: 0 };
                }
            } else if (engagedEnemies.length > 0) {
                for (let item of engagedEnemies) {
                    let e = item.enemy;
                    const dSq = (e.x - this.x) * (e.x - this.x) + (e.y - this.y) * (e.y - this.y);
                    if (dSq < minDistSq) {
                        minDistSq = dSq;
                        closest = item;
                    }
                }
                if (closest) {
                    this.target = closest.enemy;
                    let c = closest.count;
                    let hitDist = this.size + this.target.size;
                    let overlapDist = this.size;
                    let yOff = 0;

                    if (c === 1) yOff = -overlapDist;
                    else if (c === 2) yOff = overlapDist;
                    else if (c === 3) yOff = -overlapDist * 2;
                    else if (c === 4) yOff = overlapDist * 2;
                    else if (c === 5) yOff = -overlapDist * 3;
                    else if (c === 6) yOff = overlapDist * 3;
                    else if (c === 7) yOff = -overlapDist * 4;
                    else if (c === 8) yOff = overlapDist * 4;
                    else if (c === 9) yOff = -overlapDist * 5;

                    this.targetOffset = { x: hitDist * 0.75, y: yOff };
                }
            }
        }

        if (this.target) {
            const idealX = this.target.x + this.targetOffset.x;
            const idealY = this.target.y + this.targetOffset.y;

            const dx = idealX - this.x;
            const dy = idealY - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;

            if (dist > currentSpeed) {
                this.x += (dx / dist) * currentSpeed;
                this.y += (dy / dist) * currentSpeed;
            } else {
                this.x = idealX;
                this.y = idealY;
            }

            if (this.attackCooldown <= 0) {
                const actualDx = this.target.x - this.x;
                const actualDy = this.target.y - this.y;
                const hitDist = this.size + this.target.size;

                if (actualDx * actualDx + actualDy * actualDy < (hitDist * 2.2) * (hitDist * 2.2)) {
                    
                    let finalDamage = this.atk;
                    let isCrit = false;
                    
                    if (this.type === 'hound' && player.skillStats.houndCritChance && Math.random() < player.skillStats.houndCritChance) { 
                        finalDamage *= player.skillStats.houndCritMultiplier; 
                        isCrit = true;
                    }

                    this.target.hp -= finalDamage;
                    
                    damageTexts.push(new DamageText(
                        this.target.x,
                        this.target.y,
                        finalDamage,
                        this.type === 'hound' ? (isCrit ? '#FFD700' : '#FF9800') : '#8BC34A',
                        isCrit
                    ));
                    
                    this.attackCooldown = this.attackInterval;
                }
            }
        } else {
            const dx = player.x - this.x;
            const dy = player.y - this.y;
            const distSq = dx * dx + dy * dy;
            if (distSq > 100 * 100) {
                const dist = Math.sqrt(distSq);
                this.x += (dx / dist) * currentSpeed;
                this.y += (dy / dist) * currentSpeed;
            }
        }

        if (this.attackCooldown > 0) this.attackCooldown--;
        return this.hp > 0;
    }

    draw() {
        if (this.isSpawning) {
            let progress = this.spawnTimer / this.spawnDuration;
            ctx.save();
            ctx.beginPath();
            ctx.ellipse(this.x, this.y + 10, 25 * progress, 10 * progress, 0, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 215, 0, ${1 - progress})`;
            ctx.fill();

            ctx.globalAlpha = progress;
            ctx.font = `${this.size * 2}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.emoji, this.x, this.y);
            ctx.restore();
        } else {
            if (this.type === 'frog' && player.skillStats.isSpecial) {
                ctx.fillStyle = 'rgba(118, 255, 3, 0.06)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, player.skillStats.poisonRadius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.lineWidth = 1.5;
                this.bubbles.forEach(b => {
                    ctx.beginPath();
                    ctx.arc(this.x + b.x, this.y + b.dy, b.r, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(118, 255, 3, ${(b.life / b.maxLife) * 0.6})`;
                    ctx.stroke();
                });
            }

            if (this.type === 'hound' && (this.isDashing || this.isJumping)) {
                ctx.save();
                for (let j = 0; j < this.trail.length; j++) {
                    ctx.globalAlpha = (j / this.trail.length) * 0.5;
                    ctx.font = `${this.size * 2}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.emoji, this.trail[j].x, this.trail[j].y);
                }
                ctx.restore();
            }

            ctx.font = `${this.size * 2}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            let drawY = this.y + this.visualYOffset;
            ctx.fillText(this.emoji, this.x, drawY);

            ctx.fillStyle = '#F44336';
            ctx.fillRect(this.x - 10, drawY - 20, 20, 3);
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(this.x - 10, drawY - 20, 20 * (this.hp / this.maxHp), 3);
        }
    }
}

class TetherEffect {
    constructor(target, stats) {
        this.target = target;
        this.stats = stats;
        this.duration = 0;
        this.maxDuration = stats.tetherDuration;
    }

    update() {
        if (!this.target || this.target.hp <= 0 || this.target.isFading) {
            this.convertToFrog();
            return false;
        }

        this.target.slowMultiplier = 1.0 - this.stats.tetherSlow;
        this.duration++;

        if (this.duration >= this.maxDuration) {
            this.convertToFrog();
            return false;
        }
        return true;
    }

    convertToFrog() {
        if (!this.target || this.target.isFading) return;

        effects.push(new TransformPoof(this.target.x, this.target.y));

        let frogCount = summons.filter(s => s.type === 'frog').length;
        if (frogCount >= player.skillStats.maxFrogs) {
            let oldestFrogIndex = summons.findIndex(s => s.type === 'frog');
            if (oldestFrogIndex !== -1) {
                let oldFrog = summons[oldestFrogIndex];
                for (let e of enemies) {
                    if (e.tauntedBy === oldFrog) e.tauntedBy = null;
                }
                summons.splice(oldestFrogIndex, 1);
            }
        }

        this.target.isFading = true;
        this.target.fadeDuration = 45;
        this.target.fadeTimer = 0;

        summons.push(new Summon(this.target.x, this.target.y, 'frog', this.target));
        player.skillStats.currentTetherTarget = null;
    }

    draw() {
        if (!this.target || this.target.isFading) return;

        ctx.save();
        ctx.beginPath();
        ctx.setLineDash([5, 5]);
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(this.target.x, this.target.y);
        ctx.strokeStyle = 'rgba(255, 0, 255, 0.8)';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(
            this.target.x,
            this.target.y,
            this.target.size + 10,
            -Math.PI / 2,
            -Math.PI / 2 + (this.duration / this.maxDuration) * Math.PI * 2
        );
        ctx.strokeStyle = 'rgba(255, 0, 255, 0.8)';
        ctx.lineWidth = 3;
        ctx.setLineDash([]);
        ctx.stroke();
        ctx.restore();
    }
}

class Gem {

    }
    update() {

        const dy = player.y - this.y;
        const distSq = dx * dx + dy * dy;
        if (distSq < 6400) {
            this.x += dx * 0.1;
            this.y += dy * 0.1;
        }
        if (distSq < (player.size + this.size) * (player.size + this.size)) {
            player.exp++;
            updateUI();

            return false;
        }
        return true;

    draw() {
        ctx.fillStyle = '#4CAF50';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

class Projectile {
    constructor(x, y, target, stats, isSplit = false) {
        this.x = x;
        this.y = y;
        this.target = target;
        this.stats = stats;
        this.age = 0; 
        this.speed = isSplit ? stats.speed * 1.5 : stats.speed; 
        this.isSpecial = stats.isSpecial;
        this.hitEnemies = new Set();
        this.isSplit = isSplit;
        this.damage = isSplit ? stats.damage * 0.30 : stats.damage;
        this.size = isSplit ? 3.5 : (stats.size || 12);
        this.pierce = 1;

        if (this.target) this.angle = Math.atan2(this.target.y - this.y, this.target.x - this.x);
        else this.angle = -Math.PI / 2;

        if (!isSplit) this.angle += (Math.random() - 0.5) * 0.6;
        this.vx = Math.cos(this.angle) * this.speed;
        this.vy = Math.sin(this.angle) * this.speed;
    }

    update() {
        this.age++;
        
        // 放寬邊界限制，給魔彈迴轉的空間 (畫面外 100px 才銷毀)
        if (this.x < -100 || this.x > canvas.width + 100 || this.y < -100 || this.y > canvas.height + 100) {
            return false;
        }

        // 每幀自動重新尋找距離「魔彈本身」最近的敵人
        let closest = null;
        let minDistSq = Infinity;
        for (let i = 0; i < enemies.length; i++) {
            let e = enemies[i];
            if (e.hp <= 0 || e.isFading || this.hitEnemies.has(e)) continue;
            const dSq = (e.x - this.x) * (e.x - this.x) + (e.y - this.y) * (e.y - this.y);
            if (dSq < minDistSq) {
                minDistSq = dSq;
                closest = e;
            }
        }
        this.target = closest;

        if (this.target) {
            // 魔彈每幀轉向速度改為 3 度 (分裂小魔彈維持 4 度)
            let turnAmountDeg = this.isSplit ? 4 : 3;
            const dx = this.target.x - this.x;
            const dy = this.target.y - this.y;
            const targetAngle = Math.atan2(dy, dx);
            let angleDiff = targetAngle - this.angle;

            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

            const turnSpeedRad = turnAmountDeg * (Math.PI / 180);

            if (angleDiff > turnSpeedRad) angleDiff = turnSpeedRad;
            else if (angleDiff < -turnSpeedRad) angleDiff = -turnSpeedRad;

            this.angle += angleDiff;
            this.vx = Math.cos(this.angle) * this.speed;
            this.vy = Math.sin(this.angle) * this.speed;
        }

        this.x += this.vx;
        this.y += this.vy;

        for (let i = 0; i < enemies.length; i++) {
            let e = enemies[i];
            if (e.hp <= 0 || e.isFading || this.hitEnemies.has(e)) continue;

            const distSq = (e.x - this.x) * (e.x - this.x) + (e.y - this.y) * (e.y - this.y);
            if (distSq < (e.size + this.size) * (e.size + this.size)) {
                let actualDamage = (e.type === 'boss') ? this.damage * 0.65 : this.damage;
                e.hp -= actualDamage;
                this.hitEnemies.add(e);

                let textColor = this.isSplit
                    ? ((e.type === 'boss') ? '#e8dfb5' : '#ffffcc')
                    : ((e.type === 'boss') ? '#ffaa00' : '#ffea00');

                damageTexts.push(new DamageText(e.x, e.y, actualDamage, textColor));

                if (!this.isSplit && this.stats.splitCount > 0 && this.hitEnemies.size === 1) {
                    
                    // 以主魔彈擊中時的同方向為基準，在正負60度（共120度）內平均散射生成
                    let splitCount = this.stats.splitCount;
                    let spreadArc = 120 * (Math.PI / 180); // 120度轉換為弧度
                    let startAngle = this.angle - spreadArc / 2;

                    for (let j = 0; j < splitCount; j++) {
                        let splitAngle;
                        if (splitCount === 1) {
                            splitAngle = this.angle;
                        } else {
                            splitAngle = startAngle + j * (spreadArc / (splitCount - 1));
                        }

                        let splitProj = new Projectile(
                            this.x,
                            this.y,
                            null, // 生成後第一幀不強制鎖敵，讓它們先以扇形飛出
                            this.stats,
                            true
                        );
                        splitProj.hitEnemies.add(e);

                        // 覆蓋建構子內的初始角度與速度，設定為扇形散射角度
                        splitProj.angle = splitAngle;
                        splitProj.vx = Math.cos(splitProj.angle) * splitProj.speed;
                        splitProj.vy = Math.sin(splitProj.angle) * splitProj.speed;
                        projectiles.push(splitProj);
                    }
                }

                this.pierce--;
                if (this.pierce <= 0) return false;
            }
        }
        return true;
    }

    draw() {
        if (this.isSpecial) {
            ctx.fillStyle = this.isSplit ? 'rgba(255, 165, 0, 0.3)' : 'rgba(255, 69, 0, 0.4)';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 1.6, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.font = this.isSplit ? '16px Arial' : '24px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.isSplit ? '✨' : '🌟', this.x, this.y);
    }
}

class FrostEffect {
    constructor(x, y, stats) {
        this.x = x;
        this.y = y;
        this.maxRadius = stats.radius;
        this.radius = 0; // 從 0 開始擴展
        this.duration = stats.duration;
        this.maxDuration = stats.duration;
        this.damage = stats.damage;
        this.isSpecial = stats.isSpecial;
        this.processedEnemies = new Set();
    }

    update() {
        let isExpanding = false;
        if (this.radius < this.maxRadius) {
            this.radius += 8;
            isExpanding = true;
            if (this.radius > this.maxRadius) {
                this.radius = this.maxRadius;
            }
        }

        this.duration--;
        let elapsedFrames = this.maxDuration - this.duration;

        for (let i = 0; i < enemies.length; i++) {
            let e = enemies[i];
            if (e.hp <= 0 || e.isFading) continue;

            const distSq = (e.x - this.x) * (e.x - this.x) + (e.y - this.y) * (e.y - this.y);
            if (distSq < this.radius * this.radius) {
                e.slowMultiplier = e.type === 'boss' ? 0.8 : 0.6;

                if (!this.processedEnemies.has(e)) {
                    this.processedEnemies.add(e);
                    
                    // 只有在冰環擴張階段碰到的才會受到初始爆發傷害
                    if (isExpanding) {
                        e.hp -= this.damage;
                        damageTexts.push(new DamageText(e.x, e.y, this.damage, '#00ffff'));
                    }

                    // 絕對零度：冰凍效果 (一碰到就判定)
                    if (this.isSpecial) {
                        if (e.type === 'boss') {
                            e.frostHitCount++;
                            if (e.frostHitCount >= 3) {
                                e.frozenTimer = 24;
                                e.frostHitCount = 0;
                            }
                        } else {
                            e.frozenTimer = 24;
                        }
                    }
                }

                // 後續持續傷害 (每 4 幀 1 點)
                if (elapsedFrames > 0 && elapsedFrames % 4 === 0) {
                    e.hp -= 1;
                    damageTexts.push(new DamageText(e.x, e.y, 1, '#cceeff'));
                }
            }
        }

        return this.duration > 0;
    }

    draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.duration / this.maxDuration);
        ctx.strokeStyle = 'rgb(150, 200, 255)';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.stroke();

        ctx.font = `${Math.max(10, this.radius * 1.2)}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('❄️', this.x, this.y);
        ctx.restore();
    }
}

function fireSkill() {
    const s = player.skillStats;

    if (player.skill === 'summon') {
        const houndCount = summons.filter(sum => sum.type === 'hound').length;

        if (houndCount < s.maxHounds) {
            s.houndSpawnTimer++;
            if (s.houndSpawnTimer >= Math.max(1, s.spawnInterval)) {
                summons.push(new Summon(player.x, player.y, 'hound'));
                s.houndSpawnTimer = 0;
            }
        }

        if (!s.currentTetherTarget || s.currentTetherTarget.hp <= 0 || s.currentTetherTarget.isFading) {
            let bestTarget = null;
            let maxHpFound = -1;

            for (let i = 0; i < enemies.length; i++) {
                let e = enemies[i];
                const m = e.size + 10;
                if (e.type === 'boss' || e.hp <= 0 || e.isFading) continue;
                if (e.x < m || e.x > canvas.width - m || e.y < m || e.y > canvas.height - m) continue;

                if (e.maxHp > maxHpFound) {
                    maxHpFound = e.maxHp;
                    bestTarget = e;
                }
            }

            if (bestTarget) {
                s.currentTetherTarget = bestTarget;
                tethers.push(new TetherEffect(bestTarget, s));
            }
        }

        return;
    }

    if (s.currentCooldown > 0) {
        s.currentCooldown--;
        return;
    }

    if (player.skill === 'missile') {
        
        // 尋找離玩家最近的怪物
        let closestE = null;
        let minDistSq = Infinity;
        for (let i = 0; i < enemies.length; i++) {
            let e = enemies[i];
            if (e.hp <= 0 || e.isFading) continue;
            let dSq = (e.x - player.x) * (e.x - player.x) + (e.y - player.y) * (e.y - player.y);
            if (dSq < minDistSq) {
                minDistSq = dSq;
                closestE = e;
            }
        }

        // 預設發射角度 (如果沒怪物就預設朝上)
        let spawnAngle = -Math.PI / 2;
        if (closestE) {
            spawnAngle = Math.atan2(closestE.y - player.y, closestE.x - player.x);
        }

        for (let i = 0; i < s.count; i++) {
            // 給予微小隨機擴散角與距離，讓多發魔彈生成時不會完全重疊
            let angleOffset = (Math.random() - 0.5) * 0.5;
            let finalAngle = spawnAngle + angleOffset;
            let spawnDist = 20 + Math.random() * 10; // 生成在離角色 20~30px 的位置

            projectiles.push(new Projectile(
                player.x + Math.cos(finalAngle) * spawnDist,
                player.y + Math.sin(finalAngle) * spawnDist,
                closestE, // 直接把最近的怪物傳進去作為初始鎖定目標
                s,
                false
            ));
        }

        s.currentCooldown = s.cooldown;
    } else if (player.skill === 'frost') {
        effects.push(new FrostEffect(player.x, player.y, s));
        s.currentCooldown = s.cooldown;
    }
}

function updateUI() {
    document.getElementById('exp-bar').style.width = `${(player.exp / player.nextExp) * 100}%`;
    document.getElementById('status').innerText = `進化等級: ${player.level} / 10`;
    updateSummonCountUI();
}

function levelUp() {
    joystick.active = false;
    gameState = 'paused';
    player.level++;
    player.hp = Math.min(player.maxHp, player.hp + (player.maxHp / 6));
    player.exp = 0;
    player.nextExp = Math.floor(player.nextExp * 1.5);
    
    if (player.skill === 'summon') {
        recalcSummonStats(player.skillStats);
        refreshExistingSummons();
    }
    
    updateUI();

    const screen = document.getElementById('upgrade-screen');
    const optionsDiv = document.getElementById('upgrade-options');
    optionsDiv.innerHTML = '';
    screen.classList.remove('hidden');

    const s = player.skillStats;
    if (player.level === 10) level10Frames = 0;

    if (player.level === 5) {
        document.getElementById('upgrade-title').innerText = "第 5 次進化：超級強化！";
        let btn = document.createElement('button');
        btn.className = 'btn btn-upgrade btn-special';
        btn.innerText = s.specialUpgrade.desc;
        btn.onclick = () => {
            s.specialUpgrade.apply(s);
            resumeGameAfterUpgrade();
        };
        optionsDiv.appendChild(btn);
        return;
    }

    if (player.skill === 'summon') {
        if (player.level === 10) {
            document.getElementById('upgrade-title').innerText = "第 10 次進化：終極覺醒！\n（三個都點選）\n大魔王只會鎖定主角，不會與召喚物1v1\n但召喚物還是可以鎖定他，不過會對所有鎖定他的召喚物造成碰撞傷害";
            const pathKeys = ['a', 'b', 'c'].filter(key => key === 'c' || s.pathTiers[key] < 8);

            if (pathKeys.length === 0) {
                resumeGameAfterUpgrade();
                return;
            }

            let clickedCount = 0;
            pathKeys.forEach(key => {
                let btn = document.createElement('button');
                btn.className = 'btn btn-upgrade btn-special';
                btn.innerText = getSummonUpgradeLabel(key);
                btn.onclick = () => {
                    applySummonUpgrade(key);
                    btn.classList.add('hidden');
                    clickedCount++;
                    if (clickedCount === pathKeys.length) resumeGameAfterUpgrade();
                };
                optionsDiv.appendChild(btn);
            });
            return;
        } else {
            document.getElementById('upgrade-title').innerText = "技能強化！";

            const availableKeys = ['a', 'b', 'c'].filter(key => key === 'c' || s.pathTiers[key] < 8);
            
            shuffleArray(availableKeys);
            
            const selected = availableKeys.slice(0, Math.min(2, availableKeys.length));

            selected.forEach(key => {
                let btn = document.createElement('button');
                btn.className = 'btn btn-upgrade';
                btn.innerText = getSummonUpgradeLabel(key);
                btn.onclick = () => {
                    applySummonUpgrade(key);
                    resumeGameAfterUpgrade();
                };
                optionsDiv.appendChild(btn);
            });

            return;
        }
    }

    if (player.level === 10) {
        document.getElementById('upgrade-title').innerText = "第 10 次進化：終極覺醒！\n（三個都點選）";
        let choices = [...s.upgrades];
        let clickedCount = 0;
        choices.forEach(choice => {
            let btn = document.createElement('button');
            btn.className = 'btn btn-upgrade btn-special';
            btn.innerText = choice.desc;
            btn.onclick = () => {
                choice.apply(s);
                btn.classList.add('hidden');
                clickedCount++;
                if (clickedCount === choices.length) resumeGameAfterUpgrade();
            };
            optionsDiv.appendChild(btn);
        });
    } else {
        document.getElementById('upgrade-title').innerText = "技能強化！";
        let available = [...s.upgrades].filter(choice => {
            if (s.id === 'missile' && choice.id === 'u2' && s.cooldown <= 10) return false;
            // 冰霜法環已移除最低冷卻時間限制
            return true;
        });
        
        shuffleArray(available);
        
        available.slice(0, 2).forEach(choice => {
            let btn = document.createElement('button');
            btn.className = 'btn btn-upgrade';
            btn.innerText = choice.desc;
            btn.onclick = () => {
                choice.apply(s);
                resumeGameAfterUpgrade();
            };
            optionsDiv.appendChild(btn);
        });
    }
}

function resumeGameAfterUpgrade() {
    document.getElementById('upgrade-screen').classList.add('hidden');
    gameState = 'playing';

    if (player.level === 10) {
        document.getElementById('status').innerText = "最終波！肅清所有怪物以獲勝！";
        document.getElementById('status').style.color = "#FFEB3B";
        enemies.push(new Enemy(1 + player.level * 0.3, 'boss'));
        
        if (player.skill === 'summon') {
            summons.push(new Summon(player.x, player.y, 'hound'));
        }
    }

    updateSummonCountUI();
}

function gameOver(isWin) {
    joystick.active = false;
    gameState = 'gameover';
    document.getElementById('game-over-screen').classList.remove('hidden');
    document.getElementById('end-title').innerText = isWin ? "挑戰成功！你肅清了戰場！" : "挑戰失敗！";
    document.getElementById('end-title').style.color = isWin ? "#4CAF50" : "#F44336";
}

function drawConfetti() {
    if (confettis.length === 0) {
        for (let i = 0; i < 150; i++) {
            confettis.push({
                x: Math.random() * canvas.width,
                y: Math.random() * -canvas.height,
                vx: (Math.random() - 0.5) * 4,
                vy: Math.random() * 3 + 2,
                size: Math.random() * 8 + 6,
                color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                angle: Math.random() * 360,
                spin: (Math.random() - 0.5) * 10
            });
        }
    }

    confettis.forEach(c => {
        c.x += c.vx;
        c.y += c.vy;
        c.angle += c.spin;
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.angle * Math.PI / 180);
        ctx.fillStyle = c.color;
        ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size * 0.6);
        ctx.restore();
        if (c.y > canvas.height) {
            c.y = -10;
            c.x = Math.random() * canvas.width;
        }
    });
}

function drawJoystick() {
    if (!joystick.active) return;

    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.arc(joystick.startX, joystick.startY, joystick.maxRadius, 0, Math.PI * 2);
    ctx.fillStyle = '#555';
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#fff';
    ctx.stroke();

    let dx = joystick.currentX - joystick.startX;
    let dy = joystick.currentY - joystick.startY;
    const dist = Math.hypot(dx, dy);

    if (dist > joystick.maxRadius) {
        dx = (dx / dist) * joystick.maxRadius;
        dy = (dy / dist) * joystick.maxRadius;
    }

    ctx.beginPath();
    ctx.arc(joystick.startX + dx, joystick.startY + dy, 20, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.restore();
}

function gameLoop() {
    if (gameState === 'gameover') {
        if (player.hp > 0) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            gems.forEach(g => g.draw());
            healDrops.forEach(h => h.draw());
            projectiles.forEach(p => p.draw());
            effects.forEach(e => e.draw());
            enemies.forEach(e => e.draw());
            tethers.forEach(t => t.draw());
            summons.forEach(s => s.draw());
            damageTexts.forEach(dt => dt.draw());

            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🧙', player.x, player.y);
            drawConfetti();
        }
        updateSummonCountUI();
        requestAnimationFrame(gameLoop);
        return;
    }

    if (gameState !== 'playing') {
        updateSummonCountUI();
        if (gameState === 'paused' || gameState === 'start') requestAnimationFrame(gameLoop);
        return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let moveX = 0;
    let moveY = 0;

    if (keys['a'] || keys['arrowleft']) moveX -= 1;
    if (keys['d'] || keys['arrowright']) moveX += 1;
    if (keys['w'] || keys['arrowup']) moveY -= 1;
    if (keys['s'] || keys['arrowdown']) moveY += 1;

    if (joystick.active) {
        const jx = joystick.currentX - joystick.startX;
        const jy = joystick.currentY - joystick.startY;
        const dist = Math.hypot(jx, jy);
        if (dist > 5) {
            moveX = jx / dist;
            moveY = jy / dist;
        }
    }

    if (moveX !== 0 || moveY !== 0) {
        const dist = Math.hypot(moveX, moveY);
        const nx = (moveX / dist) * player.speed;
        const ny = (moveY / dist) * player.speed;

        if (player.x + nx > player.size && player.x + nx < canvas.width - player.size) player.x += nx;
        if (player.y + ny > player.size && player.y + ny < canvas.height - player.size) player.y += ny;
    }

    fireSkill();
    frameCount++;

    let stopSpawning = false;
    if (player.level >= 10) {
        level10Frames += bossIsDead ? 2 : 1;
        stopSpawning = level10Frames >= 2400;
        let spawnRate = bossIsDead ? 8 : 16;

        if (!stopSpawning) {
            if (frameCount % spawnRate === 0) enemies.push(new Enemy(1 + player.level * 0.3, 'normal'));
            if (frameCount % (spawnRate * 4) === 0) enemies.push(new Enemy(1 + player.level * 0.3, 'mini'));
        }
    } else {
        let spawnRate = Math.max(15, 80 - player.level * 6);
        if (frameCount % spawnRate === 0) enemies.push(new Enemy(1 + player.level * 0.3, 'normal'));
        if (player.level >= 5 && frameCount % (spawnRate * 4) === 0) enemies.push(new Enemy(1 + player.level * 0.3, 'mini'));
    }

    if (gems.length > 200) gems.shift();
    if (healDrops.length > 50) healDrops.shift();

    for (let i = gems.length - 1; i >= 0; i--) if (!gems[i].update()) gems.splice(i, 1);
    for (let i = healDrops.length - 1; i >= 0; i--) if (!healDrops[i].update()) healDrops.splice(i, 1);
    for (let i = projectiles.length - 1; i >= 0; i--) if (!projectiles[i].update()) projectiles.splice(i, 1);
    for (let i = effects.length - 1; i >= 0; i--) if (!effects[i].update()) effects.splice(i, 1);
    for (let i = damageTexts.length - 1; i >= 0; i--) if (!damageTexts[i].update()) damageTexts.splice(i, 1);

    for (let i = summons.length - 1; i >= 0; i--) {
        if (!summons[i].update()) {
            if (summons[i].target && summons[i].target.tauntedBy === summons[i]) summons[i].target.tauntedBy = null;
            summons.splice(i, 1);
        }
    }

    for (let i = tethers.length - 1; i >= 0; i--) {
        if (!tethers[i].update()) tethers.splice(i, 1);
    }

    gems.forEach(g => g.draw());
    healDrops.forEach(h => h.draw());
    projectiles.forEach(p => p.draw());
    effects.forEach(e => e.draw());
    tethers.forEach(t => t.draw());
    summons.forEach(s => s.draw());

    for (let i = enemies.length - 1; i >= 0; i--) {
        enemies[i].update();
        enemies[i].draw();

        if (enemies[i].hp <= 0 && !enemies[i].isFading) {
            if (enemies[i].type === 'boss') bossIsDead = true;

            let gemCount = enemies[i].type === 'boss' ? 30 : (enemies[i].type === 'mini' ? 5 : 1);
            for (let g = 0; g < gemCount; g++) {
                gems.push(new Gem(
                    enemies[i].x + (Math.random() * 20 - 10),
                    enemies[i].y + (Math.random() * 20 - 10)
                ));
            }

            if (enemies[i].type === 'normal') {
                normalKillCount++;
                if (normalKillCount >= 10) {
                    healDrops.push(new HealDrop(enemies[i].x, enemies[i].y));
                    normalKillCount = 0;
                }
            }

            enemies.splice(i, 1);
        }
    }

    damageTexts.forEach(dt => dt.draw());

    ctx.font = '30px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🧙', player.x, player.y);

    ctx.fillStyle = '#F44336';
    ctx.fillRect(player.x - 15, player.y - 25, 30, 5);
    ctx.fillStyle = '#4CAF50';
    ctx.fillRect(player.x - 15, player.y - 25, 30 * (player.hp / player.maxHp), 5);

    drawJoystick();
    updateSummonCountUI();

    if (player.level >= 10 && stopSpawning && enemies.length === 0) gameOver(true);

    requestAnimationFrame(gameLoop);
}
</script>
