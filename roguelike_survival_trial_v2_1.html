<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Roguelike 生存：極限試煉 v5.7 (召喚物右側列陣版)</title>
<style>
    body { margin: 0; overflow: hidden; background-color: #222; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; touch-action: none; }
    canvas { display: block; }
    #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.85); padding: 30px; border-radius: 10px; border: 2px solid #555; text-align: center; pointer-events: auto; width: 80%; max-width: 400px; box-sizing: border-box; }
    .btn { display: inline-block; background: #4CAF50; color: white; padding: 10px 20px; margin: 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: background 0.3s; }
    .btn:hover { background: #45a049; }
    .btn-upgrade { background: #2196F3; width: 100%; margin: 10px 0; display: block; }
    .btn-upgrade:hover { background: #1976D2; }
    .btn-special { background: #ff9800; font-weight: bold; text-shadow: 1px 1px 2px black; }
    .btn-special:hover { background: #e68a00; }
    #exp-bar-container { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 80%; height: 20px; background: #333; border-radius: 10px; border: 2px solid #777; }
    #exp-bar { height: 100%; width: 0%; background: #4CAF50; border-radius: 8px; transition: width 0.2s; }
    #status { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); font-size: 18px; text-shadow: 1px 1px 2px black; }
    .hidden { display: none !important; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div id="exp-bar-container" class="hidden">
        <div id="exp-bar"></div>
    </div>
    <div id="status" class="hidden">等級: 0 / 10</div>

    <div id="start-screen" class="panel">
        <h2>Roguelike 生存試煉</h2>
        <p>請選擇你的初始技能：</p>
        <button class="btn" onclick="startGame('missile')">魔法追蹤彈</button>
        <button class="btn" onclick="startGame('frost')">冰霜法環</button>
        <button class="btn" style="background:#673AB7" onclick="startGame('summon')">召喚法術</button>
    </div>

    <div id="upgrade-screen" class="panel hidden">
        <h2 id="upgrade-title">技能強化！</h2>
        <div id="upgrade-options"></div>
    </div>

    <div id="game-over-screen" class="panel hidden">
        <h2 id="end-title">遊戲結束</h2>
        <button class="btn" onclick="location.reload()">重新開始</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameState = 'start';
let keys = {};
let frameCount = 0;
let normalKillCount = 0; 
let confettis = []; 

let enemies = [];
let gems = [];
let healDrops = []; 
let projectiles = [];
let effects = [];
let damageTexts = []; 
let summons = []; 
let tethers = []; 

let level10Frames = 0;
let bossIsDead = false;

const player = {
    x: canvas.width / 2, y: canvas.height / 2,
    size: 15, speed: 4, hp: 100, maxHp: 100,
    exp: 0, nextExp: 5, level: 0,
    skill: null, skillStats: {}
};

const joystick = {
    active: false, startX: 0, startY: 0,
    currentX: 0, currentY: 0, maxRadius: 50
};

const skillDefinitions = {
    missile: {
        id: 'missile', name: '魔法追蹤彈',
        cooldown: 45, currentCooldown: 0,
        count: 1, speed: 5, damage: 15, 
        turnSpeed: 2.0, size: 12, splitCount: 0, isSpecial: false, 
        upgrades: [
            { id: 'u1', desc: '魔法追蹤彈+1', apply: (s) => s.count += 1 },
            { id: 'u2', desc: '增加攻擊頻度', apply: (s) => s.cooldown = (player.level === 10) ? Math.max(2, s.cooldown - 10) : Math.max(10, s.cooldown - 10) },
            { id: 'u3', desc: '擊中後分裂', apply: (s) => s.splitCount += 2 }
        ],
        specialUpgrade: { id: 's1', desc: '超級強化：魔力爆發 (攻擊力提升2.5倍)', apply: (s) => { s.damage *= 2.5; s.isSpecial = true; } }
    },
    frost: {
        id: 'frost', name: '冰霜法環',
        cooldown: 120, currentCooldown: 0,
        radius: 50, duration: 60, damage: 40, isSpecial: false,
        upgrades: [
            { id: 'u1', desc: '擴大法環半徑', apply: (s) => s.radius += 30 },
            { id: 'u2', desc: '增加發動頻率', apply: (s) => s.cooldown = (player.level === 10) ? Math.max(10, s.cooldown - 10) : Math.max(60, s.cooldown - 10) }, 
            { id: 'u3', desc: '增加冰環停留時間', apply: (s) => s.duration += 24 } 
        ],
        specialUpgrade: { id: 's1', desc: '超級強化：絕對零度 (命中瞬間結凍)', apply: (s) => s.isSpecial = true }
    },
    summon: {
        id: 'summon', name: '召喚法術',
        tetherDuration: 600, 
        fearRadius: 60,
        fearCooldown: 180, 
        summonBonusHp: 0,
        summonBonusAtk: 0,
        isSpecial: false,
        houndSpawnTimer: 0,
        currentTetherTarget: null,
        upgrades: [
            { id: 'u1', desc: '更快控制敵人', apply: (s) => s.tetherDuration = Math.max(60, s.tetherDuration - 30) },
            { id: 'u2', desc: '召喚物加強', apply: (s) => { s.summonBonusHp += 20; s.summonBonusAtk += 4; } },
            { id: 'u3', desc: '恐懼擴散', apply: (s) => { s.fearRadius += 10; s.fearCooldown = Math.max(30, s.fearCooldown - 5); } }
        ],
        specialUpgrade: { id: 's1', desc: '超級強化：劇毒沼澤 (青蛙散發毒霧)', apply: (s) => s.isSpecial = true }
    }
};

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

canvas.addEventListener('touchstart', e => {
    if (gameState !== 'playing') return;
    e.preventDefault();
    const touch = e.changedTouches[0];
    joystick.active = true;
    joystick.startX = touch.clientX; joystick.startY = touch.clientY;
    joystick.currentX = touch.clientX; joystick.currentY = touch.clientY;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
    if (!joystick.active) return;
    e.preventDefault();
    const touch = e.changedTouches[0];
    joystick.currentX = touch.clientX; joystick.currentY = touch.clientY;
}, { passive: false });
const stopJoystick = () => joystick.active = false;
canvas.addEventListener('touchend', stopJoystick);
canvas.addEventListener('touchcancel', stopJoystick);

function startGame(skillId) {
    player.skill = skillId;
    player.skillStats = JSON.parse(JSON.stringify(skillDefinitions[skillId]));
    player.skillStats.upgrades = skillDefinitions[skillId].upgrades;
    player.skillStats.specialUpgrade = skillDefinitions[skillId].specialUpgrade;
    
    player.x = canvas.width / 2; player.y = canvas.height / 2;
    player.hp = player.maxHp;
    player.level = 0; player.exp = 0; player.nextExp = 5;
    
    normalKillCount = 0; 
    enemies = []; gems = []; healDrops = []; projectiles = []; effects = []; damageTexts = [];
    summons = []; tethers = [];
    
    level10Frames = 0; bossIsDead = false;

    if (skillId === 'summon') {
        summons.push(new Summon(player.x, player.y - 30, 'hound'));
    }
    
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('exp-bar-container').classList.remove('hidden');
    document.getElementById('status').classList.remove('hidden');
    updateUI();
    gameState = 'playing';
    requestAnimationFrame(gameLoop);
}

class DamageText {
    constructor(x, y, damage, color) {
        this.x = x + (Math.random() - 0.5) * 30; 
        this.y = y + (Math.random() - 0.5) * 10;
        this.damage = Math.round(damage);
        this.color = color;
        this.life = 35; this.maxLife = 35;
        this.vy = -1.5 - Math.random(); 
    }
    update() {
        this.y += this.vy; this.life--;
        return this.life > 0;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.life / this.maxLife;
        ctx.fillStyle = this.color; ctx.font = 'bold 18px Arial'; ctx.textAlign = 'center';
        ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
        ctx.strokeText(this.damage, this.x, this.y); ctx.fillText(this.damage, this.x, this.y);
        ctx.restore();
    }
}

class FearRipple {
    constructor(x, y, maxRadius) {
        this.x = x; this.y = y;
        this.maxRadius = maxRadius;
        this.radius = 0;
        this.life = 35; 
        this.maxLife = 35;
    }
    update() {
        let progress = 1 - (this.life / this.maxLife);
        this.radius = this.maxRadius * (1 - Math.pow(1 - progress, 3));
        this.life--;
        return this.life > 0;
    }
    draw() {
        ctx.save();
        let alpha = this.life / this.maxLife;
        ctx.globalAlpha = alpha;
        
        ctx.fillStyle = 'rgba(216, 27, 96, 0.3)'; 
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = 'rgba(255, 64, 129, 0.9)'; 
        ctx.lineWidth = 3 + (alpha * 5); 
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.stroke();
        
        ctx.restore();
    }
}

class TransformPoof {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.life = 15;
        this.maxLife = 15;
        this.radius = 5;
    }
    update() {
        this.radius += 2.5;
        this.life--;
        return this.life > 0;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.life / this.maxLife;
        ctx.fillStyle = '#8BC34A'; 
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

class Enemy {
    constructor(hpMult, type = 'normal') {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.max(canvas.width, canvas.height) / 2 + 50;
        this.x = player.x + Math.cos(angle) * dist;
        this.y = player.y + Math.sin(angle) * dist;
        this.type = type;
        
        let baseSpeed = 1.5 + Math.random() * 1;
        let hpScale = 1.2;
        if (player.level >= 5) {
            let progress = Math.min(4, player.level - 5) / 4; 
            hpScale = 1.2 * (1 + 0.5 * progress); 
        }

        if (type === 'boss') {
            this.size = 35; this.speed = 3.0; this.hp = 30 * hpMult * hpScale * 10.0; this.emoji = '👻';
        } else if (type === 'mini') {
            this.size = 18; this.speed = baseSpeed * 0.6; this.hp = 30 * hpMult * hpScale * 2.0; this.emoji = '👹';
        } else {
            this.size = 12 + Math.random() * 5; this.speed = baseSpeed; this.hp = 30 * hpMult * hpScale; this.emoji = '👾';
        }
        
        this.maxHp = this.hp; this.baseSpeed = this.speed; 
        this.frozenTimer = 0; this.frostHitCount = 0; this.slowMultiplier = 1.0;
        
        this.tauntedBy = null; 
        this.fearTimer = 0;    
        this.fearSourceX = 0;
        this.fearSourceY = 0;
    }
    update() {
        if (this.fearTimer > 0) {
            this.fearTimer--;
            const dx = this.x - this.fearSourceX;
            const dy = this.y - this.fearSourceY;
            const dist = Math.sqrt(dx*dx + dy*dy) || 1;
            const speed = this.baseSpeed * 0.2; 
            this.x += (dx / dist) * speed;
            this.y += (dy / dist) * speed;
            return; 
        }

        if (this.frozenTimer > 0) {
            this.frozenTimer--; this.slowMultiplier = 1.0; 
            return;
        }
        
        let targetX = player.x;
        let targetY = player.y;
        let targetHitDist = player.size + this.size;
        let targetObj = player;

        if (this.tauntedBy && this.tauntedBy.hp > 0) {
            targetX = this.tauntedBy.x;
            targetY = this.tauntedBy.y;
            targetHitDist = this.tauntedBy.size + this.size;
            targetObj = this.tauntedBy;
        } else {
            this.tauntedBy = null; 
        }

        const dx = targetX - this.x;
        const dy = targetY - this.y;
        const distSq = dx * dx + dy * dy; 
        const dist = Math.sqrt(distSq) || 1;
        
        let actualSpeed = this.baseSpeed * this.slowMultiplier;
        
        if (distSq > (targetHitDist * 0.9) * (targetHitDist * 0.9)) {
            this.x += (dx / dist) * actualSpeed;
            this.y += (dy / dist) * actualSpeed;
        }
        
        this.slowMultiplier = 1.0; 
        
        if (distSq < targetHitDist * targetHitDist) {
            if (targetObj === player) {
                player.hp -= 0.5;
                if (player.hp <= 0) gameOver(false);
            } else {
                targetObj.hp -= 0.5; 
            }
        }
    }
    draw() {
        if (this.frozenTimer > 0) {
            ctx.fillStyle = 'rgba(0, 255, 255, 0.4)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size * 1.5, 0, Math.PI * 2); ctx.fill();
        }
        ctx.font = `${this.size * 2}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(this.emoji, this.x, this.y); 

        if (this.fearTimer > 0) {
            ctx.font = `18px Arial`; ctx.fillText('😱', this.x, this.y - this.size - 8);
        } else if (this.type === 'boss' && this.frostHitCount > 0) {
            ctx.font = `16px Arial`; let mark = this.frostHitCount === 1 ? '❄️' : '❄️❄️'; ctx.fillText(mark, this.x, this.y - this.size - 8);
        }
    }
}

class Summon {
    constructor(x, y, type, sourceEnemyAtk = 8, sourceEnemyMaxHp = 0, sourceEnemySpeed = 3.5) {
        this.x = x; this.y = y;
        this.type = type; 
        this.size = 15;
        const s = player.skillStats;
        
        if (type === 'hound') {
            this.maxHp = 200 + (s ? s.summonBonusHp : 0);
            this.hp = this.maxHp;
            this.atk = 8 + (s ? s.summonBonusAtk : 0);
            this.speed = 3.5;
            this.emoji = '🐕';
        } else if (type === 'frog') {
            this.maxHp = (sourceEnemyMaxHp * 1.5) + (s ? s.summonBonusHp : 0);
            this.hp = this.maxHp;
            this.atk = 8 + (s ? s.summonBonusAtk : 0);
            this.speed = sourceEnemySpeed;
            this.emoji = '🐸';
        }
        
        this.target = null;
        this.attackCooldown = 0;
        this.poisonTimer = 0;
    }
    
    update() {
        if (this.type === 'frog' && player.skillStats.isSpecial) {
            this.poisonTimer++;
            if (this.poisonTimer >= 20) { 
                this.poisonTimer = 0;
                for (let i = 0; i < enemies.length; i++) {
                    let e = enemies[i];
                    if (e.hp <= 0) continue;
                    const dx = e.x - this.x; const dy = e.y - this.y;
                    if (dx*dx + dy*dy <= 80*80) { 
                        e.hp -= 2; 
                        damageTexts.push(new DamageText(e.x, e.y, 2, '#76FF03'));
                    }
                }
            }
        }

        if (!this.target || this.target.hp <= 0) {
            this.target = null;
            let closest = null; let minDistSq = Infinity;
            for (let i = 0; i < enemies.length; i++) {
                let e = enemies[i];
                const m = e.size + 10;
                if (e.hp <= 0 || (e.tauntedBy && e.tauntedBy !== this) || e.x < m || e.x > canvas.width - m || e.y < m || e.y > canvas.height - m) continue;
                
                const dx = e.x - this.x; const dy = e.y - this.y;
                const dSq = dx * dx + dy * dy;
                if (dSq < minDistSq) { minDistSq = dSq; closest = e; }
            }
            if (closest) {
                this.target = closest;
                closest.tauntedBy = this; 
            }
        }

        if (this.target) {
            const hitDist = this.size + this.target.size;
            
            // 【機制更新】強制目標定位在敵人的右側，距離為碰撞距離的 0.75 倍 (稍微重疊 25%)
            const idealX = this.target.x + hitDist * 0.75;
            const idealY = this.target.y;
            
            const dx = idealX - this.x; 
            const dy = idealY - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            
            if (dist > this.speed) {
                this.x += (dx / dist) * this.speed; 
                this.y += (dy / dist) * this.speed;
            } else {
                this.x = idealX;
                this.y = idealY;
            }
            
            if (this.attackCooldown <= 0) {
                // 為了保證移動到定位時也能順利咬擊，實際距離判定放寬
                const actualDx = this.target.x - this.x;
                const actualDy = this.target.y - this.y;
                if (actualDx * actualDx + actualDy * actualDy < (hitDist * 1.2) * (hitDist * 1.2)) {
                    this.target.hp -= this.atk;
                    damageTexts.push(new DamageText(this.target.x, this.target.y, this.atk, '#FF9800'));
                    this.attackCooldown = 30; 
                }
            }
        } else {
            const dx = player.x - this.x; const dy = player.y - this.y;
            const distSq = dx * dx + dy * dy;
            if (distSq > 100 * 100) {
                const dist = Math.sqrt(distSq);
                this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed;
            }
        }
        
        if (this.attackCooldown > 0) this.attackCooldown--;
        return this.hp > 0;
    }
    
    draw() {
        if (this.type === 'frog' && player.skillStats.isSpecial) {
            ctx.fillStyle = 'rgba(118, 255, 3, 0.2)'; ctx.beginPath(); ctx.arc(this.x, this.y, 80, 0, Math.PI*2); ctx.fill();
        }
        ctx.font = `${this.size * 2}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(this.emoji, this.x, this.y);
        ctx.fillStyle = '#F44336'; ctx.fillRect(this.x - 10, this.y - 20, 20, 3);
        ctx.fillStyle = '#4CAF50'; ctx.fillRect(this.x - 10, this.y - 20, 20 * (this.hp / this.maxHp), 3);
    }
}

class TetherEffect {
    constructor(target, stats) {
        this.target = target;
        this.stats = stats;
        this.duration = 0; 
        this.maxDuration = stats.tetherDuration;
        this.pulseTimer = 0; 
    }
    update() {
        if (!this.target || this.target.hp <= 0) {
            this.convertToFrog(); return false;
        }
        
        this.target.slowMultiplier = 0.5; 
        
        if (this.pulseTimer <= 0) {
            this.pulseTimer = this.stats.fearCooldown;
            effects.push(new FearRipple(this.target.x, this.target.y, this.stats.fearRadius));

            for (let i = 0; i < enemies.length; i++) {
                let e = enemies[i];
                if (e === this.target || e.hp <= 0) continue;
                const dx = e.x - this.target.x; const dy = e.y - this.target.y;
                if (dx*dx + dy*dy <= this.stats.fearRadius * this.stats.fearRadius) {
                    e.fearTimer = 60; 
                    e.fearSourceX = this.target.x; e.fearSourceY = this.target.y;
                }
            }
        } else {
            this.pulseTimer--;
        }
        
        this.duration++;
        if (this.duration >= this.maxDuration) {
            this.target.hp = 0; 
            this.convertToFrog(); return false;
        }
        return true;
    }
    
    convertToFrog() {
        if (!this.target) return;
        effects.push(new TransformPoof(this.target.x, this.target.y));
        summons.push(new Summon(this.target.x, this.target.y, 'frog', 8, this.target.maxHp, this.target.baseSpeed));
        player.skillStats.currentTetherTarget = null; 
    }
    
    draw() {
        if (!this.target) return;
        ctx.save();
        ctx.beginPath(); ctx.setLineDash([5, 5]); ctx.moveTo(player.x, player.y); ctx.lineTo(this.target.x, this.target.y);
        ctx.strokeStyle = 'rgba(255, 0, 255, 0.8)'; ctx.lineWidth = 2; ctx.stroke();
        
        ctx.beginPath(); ctx.arc(this.target.x, this.target.y, this.target.size + 10, -Math.PI/2, -Math.PI/2 + (this.duration / this.maxDuration) * Math.PI * 2);
        ctx.strokeStyle = 'rgba(255, 0, 255, 0.8)'; ctx.lineWidth = 3; ctx.setLineDash([]); ctx.stroke();
        
        ctx.restore();
    }
}

class Gem {
    constructor(x, y) { this.x = x; this.y = y; this.size = 5; }
    update() {
        const dx = player.x - this.x; const dy = player.y - this.y; const distSq = dx * dx + dy * dy; 
        if (distSq < 6400) { this.x += dx * 0.1; this.y += dy * 0.1; }
        if (distSq < (player.size + this.size) * (player.size + this.size)) {
            player.exp++; updateUI();
            if (player.exp >= player.nextExp && player.level < 10) levelUp();
            return false;
        }
        return true;
    }
    draw() { ctx.fillStyle = '#4CAF50'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
}

class HealDrop {
    constructor(x, y) { this.x = x; this.y = y; this.size = 5; }
    update() {
        const dx = player.x - this.x; const dy = player.y - this.y; const distSq = dx * dx + dy * dy;
        if (distSq < 6400) { this.x += dx * 0.1; this.y += dy * 0.1; }
        if (distSq < (player.size + this.size) * (player.size + this.size)) {
            player.hp = Math.min(player.maxHp, player.hp + 20); return false; 
        }
        return true;
    }
    draw() { ctx.fillStyle = '#FF5252'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
}

class Projectile {
    constructor(x, y, target, stats, isSplit = false) {
        this.x = x; this.y = y; this.target = target; this.stats = stats;
        this.speed = stats.speed; this.isSpecial = stats.isSpecial;
        this.hitEnemies = new Set(); this.isSplit = isSplit;
        this.damage = isSplit ? stats.damage * 0.40 : stats.damage;
        this.size = isSplit ? 3.5 : (stats.size || 12); this.pierce = 1; 
        this.turnSpeedRad = isSplit ? (3.0 * (Math.PI / 180)) : (stats.turnSpeed * (Math.PI / 180)); 
        if (this.target) this.angle = Math.atan2(this.target.y - this.y, this.target.x - this.x); else this.angle = -Math.PI / 2;
        if (!isSplit) this.angle += (Math.random() - 0.5) * 0.6;
        this.vx = Math.cos(this.angle) * this.speed; this.vy = Math.sin(this.angle) * this.speed;
    }
    update() {
        if (this.x < -50 || this.x > canvas.width + 50 || this.y < -50 || this.y > canvas.height + 50) return false;
        if (!this.target || this.target.hp <= 0) {
            let closest = null; let minDistSq = Infinity;
            for (let i = 0; i < enemies.length; i++) {
                let e = enemies[i];
                const m = e.size + 10;
                if (e.hp <= 0 || this.hitEnemies.has(e) || e.x < m || e.x > canvas.width - m || e.y < m || e.y > canvas.height - m) continue;
                const dSq = (e.x - this.x)*(e.x - this.x) + (e.y - this.y)*(e.y - this.y); 
                if (dSq < minDistSq) { minDistSq = dSq; closest = e; }
            }
            this.target = closest;
        }
        if (this.target) {
            const dx = this.target.x - this.x; const dy = this.target.y - this.y;
            const targetAngle = Math.atan2(dy, dx);
            let angleDiff = targetAngle - this.angle;
            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2; while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
            if (angleDiff > this.turnSpeedRad) angleDiff = this.turnSpeedRad; else if (angleDiff < -this.turnSpeedRad) angleDiff = -this.turnSpeedRad;
            this.angle += angleDiff; this.vx = Math.cos(this.angle) * this.speed; this.vy = Math.sin(this.angle) * this.speed;
        } 
        this.x += this.vx; this.y += this.vy;
        
        for (let i = 0; i < enemies.length; i++) {
            let e = enemies[i];
            if (e.hp <= 0 || this.hitEnemies.has(e)) continue;
            const distSq = (e.x - this.x)*(e.x - this.x) + (e.y - this.y)*(e.y - this.y);
            if (distSq < (e.size + this.size)*(e.size + this.size)) {
                let actualDamage = (e.type === 'boss') ? this.damage * 0.65 : this.damage;
                e.hp -= actualDamage; this.hitEnemies.add(e);
                let textColor = this.isSplit ? ((e.type === 'boss') ? '#e8dfb5' : '#ffffcc') : ((e.type === 'boss') ? '#ffaa00' : '#ffea00');
                damageTexts.push(new DamageText(e.x, e.y, actualDamage, textColor));
                
                if (!this.isSplit && this.stats.splitCount > 0 && this.hitEnemies.size === 1) {
                    for (let j = 0; j < this.stats.splitCount; j++) {
                        let splitProj = new Projectile(this.x + (Math.random() - 0.5) * 20, this.y + (Math.random() - 0.5) * 20, null, this.stats, true);
                        splitProj.hitEnemies.add(e); 
                        splitProj.angle = this.angle + (j - (this.stats.splitCount - 1) / 2) * 0.4; 
                        splitProj.vx = Math.cos(splitProj.angle) * splitProj.speed; splitProj.vy = Math.sin(splitProj.angle) * splitProj.speed;
                        projectiles.push(splitProj);
                    }
                }
                this.pierce--; if (this.pierce <= 0) return false; 
            }
        }
        return true;
    }
    draw() {
        if (this.isSpecial) { ctx.fillStyle = this.isSplit ? 'rgba(255, 165, 0, 0.3)' : 'rgba(255, 69, 0, 0.4)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size * 1.6, 0, Math.PI * 2); ctx.fill(); }
        ctx.font = this.isSplit ? '16px Arial' : '24px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(this.isSplit ? '✨' : '⭐️', this.x, this.y);
    }
}

class FrostEffect {
    constructor(x, y, stats) {
        this.x = x; this.y = y; this.maxRadius = stats.radius; this.radius = 0;
        this.duration = stats.duration; this.maxDuration = stats.duration; 
        this.damage = stats.damage; this.isSpecial = stats.isSpecial; this.processedEnemies = new Set(); 
    }
    update() {
        if (this.radius < this.maxRadius) this.radius += 8; this.duration--;
        let elapsedFrames = this.maxDuration - this.duration;
        for (let i = 0; i < enemies.length; i++) {
            let e = enemies[i]; if (e.hp <= 0) continue; 
            if ((e.x - this.x)*(e.x - this.x) + (e.y - this.y)*(e.y - this.y) < this.radius * this.radius) {
                e.slowMultiplier = e.type === 'boss' ? 0.8 : 0.6; 
                if (!this.processedEnemies.has(e)) {
                    this.processedEnemies.add(e); e.hp -= this.damage;
                    damageTexts.push(new DamageText(e.x, e.y, this.damage, '#00ffff'));
                    if (this.isSpecial) {
                        if (e.type === 'boss') {
                            if (!this.hitBossesThisCast) this.hitBossesThisCast = new Set();
                            if (!this.hitBossesThisCast.has(e)) {
                                this.hitBossesThisCast.add(e); e.frostHitCount++;
                                if (e.frostHitCount >= 3) { e.frozenTimer = 10; e.frostHitCount = 0; }
                            }
                        } else { e.frozenTimer = 10; }
                    }
                }
                if (elapsedFrames > 0 && elapsedFrames % 4 === 0) { e.hp -= 1; damageTexts.push(new DamageText(e.x, e.y, 1, '#cceeff')); }
            }
        }
        return this.duration > 0;
    }
    draw() {
        ctx.save(); ctx.globalAlpha = Math.max(0, this.duration / this.maxDuration);
        ctx.strokeStyle = 'rgb(150, 200, 255)'; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.stroke();
        ctx.font = `${Math.max(10, this.radius * 1.2)}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('❄️', this.x, this.y);
        ctx.restore();
    }
}

function fireSkill() {
    const s = player.skillStats;
    if (player.skill === 'summon') {
        let houndCount = summons.filter(sum => sum.type === 'hound').length;
        if (houndCount < 2) {
            s.houndSpawnTimer++;
            if (s.houndSpawnTimer >= 480) { 
                summons.push(new Summon(player.x, player.y, 'hound'));
                s.houndSpawnTimer = 0;
            }
        } else {
            s.houndSpawnTimer = 0;
        }
        
        if (!s.currentTetherTarget || s.currentTetherTarget.hp <= 0) {
            let bestTarget = null; let maxHpFound = -1;
            for (let i = 0; i < enemies.length; i++) {
                let e = enemies[i];
                const m = e.size + 10;
                if (e.type === 'boss' || e.hp <= 0) continue; 
                if (e.x < m || e.x > canvas.width - m || e.y < m || e.y > canvas.height - m) continue;
                
                if (e.maxHp > maxHpFound) {
                    maxHpFound = e.maxHp; bestTarget = e;
                }
            }
            if (bestTarget) {
                s.currentTetherTarget = bestTarget;
                tethers.push(new TetherEffect(bestTarget, s));
            }
        }
        return; 
    }

    if (s.currentCooldown > 0) { s.currentCooldown--; return; }
    
    if (player.skill === 'missile') {
        let initialTarget = null; let minDistSq = Infinity;
        for (let i = 0; i < enemies.length; i++) {
            let e = enemies[i];
            const m = e.size + 10;
            if (e.hp <= 0 || e.x < m || e.x > canvas.width - m || e.y < m || e.y > canvas.height - m) continue;
            const dSq = (e.x - player.x)*(e.x - player.x) + (e.y - player.y)*(e.y - player.y); 
            if (dSq < minDistSq) { minDistSq = dSq; initialTarget = e; }
        }
        for (let i = 0; i < s.count; i++) {
            projectiles.push(new Projectile(player.x + (Math.random() - 0.5) * 50, player.y + (Math.random() - 0.5) * 50, initialTarget, s, false));
        }
        s.currentCooldown = s.cooldown;
    } else if (player.skill === 'frost') {
        effects.push(new FrostEffect(player.x, player.y, s));
        s.currentCooldown = s.cooldown;
    }
}

function updateUI() {
    document.getElementById('exp-bar').style.width = `${(player.exp / player.nextExp) * 100}%`;
    document.getElementById('status').innerText = `進化等級: ${player.level} / 10`;
}

function levelUp() {
    joystick.active = false; gameState = 'paused'; player.level++;
    player.hp = Math.min(player.maxHp, player.hp + (player.maxHp / 6));
    player.exp = 0; player.nextExp = Math.floor(player.nextExp * 1.5);
    updateUI();
    
    const screen = document.getElementById('upgrade-screen');
    const optionsDiv = document.getElementById('upgrade-options');
    optionsDiv.innerHTML = ''; screen.classList.remove('hidden');

    const s = player.skillStats;
    if (player.level === 10) level10Frames = 0;

    if (player.level === 5) {
        document.getElementById('upgrade-title').innerText = "第 5 次進化：超級強化！";
        let btn = document.createElement('button'); btn.className = 'btn btn-upgrade btn-special'; btn.innerText = s.specialUpgrade.desc;
        btn.onclick = () => { s.specialUpgrade.apply(s); resumeGameAfterUpgrade(); };
        optionsDiv.appendChild(btn);
    } else if (player.level === 10) {
        document.getElementById('upgrade-title').innerText = "第 10 次進化：終極覺醒！\n(將突破極限，獲得所有能力)";
        let choices = [...s.upgrades]; let clickedCount = 0;
        choices.forEach(choice => {
            let btn = document.createElement('button'); btn.className = 'btn btn-upgrade btn-special'; btn.innerText = choice.desc;
            btn.onclick = () => {
                choice.apply(s); btn.classList.add('hidden'); clickedCount++;
                if (clickedCount === choices.length) resumeGameAfterUpgrade(); 
            };
            optionsDiv.appendChild(btn);
        });
    } else {
        document.getElementById('upgrade-title').innerText = "技能強化！";
        let available = [...s.upgrades].filter(choice => {
            if (s.id === 'missile' && choice.id === 'u2' && s.cooldown <= 10) return false;
            if (s.id === 'frost' && choice.id === 'u2' && s.cooldown <= 60) return false;
            return true;
        });
        available.sort(() => 0.5 - Math.random());
        available.slice(0, 2).forEach(choice => {
            let btn = document.createElement('button'); btn.className = 'btn btn-upgrade'; btn.innerText = choice.desc;
            btn.onclick = () => { choice.apply(s); resumeGameAfterUpgrade(); };
            optionsDiv.appendChild(btn);
        });
    }
}

function resumeGameAfterUpgrade() {
    document.getElementById('upgrade-screen').classList.add('hidden'); gameState = 'playing';
    if (player.level === 10) {
        document.getElementById('status').innerText = "最終波！肅清所有怪物以獲勝！"; document.getElementById('status').style.color = "#FFEB3B";
        enemies.push(new Enemy(1 + player.level * 0.3, 'boss'));
    }
}

function gameOver(isWin) {
    joystick.active = false; gameState = 'gameover'; document.getElementById('game-over-screen').classList.remove('hidden');
    document.getElementById('end-title').innerText = isWin ? "挑戰成功！你肅清了戰場！" : "挑戰失敗！";
    document.getElementById('end-title').style.color = isWin ? "#4CAF50" : "#F44336";
}

function drawConfetti() {
    if (confettis.length === 0) {
        for (let i = 0; i < 150; i++) confettis.push({ x: Math.random() * canvas.width, y: Math.random() * -canvas.height, vx: (Math.random() - 0.5) * 4, vy: Math.random() * 3 + 2, size: Math.random() * 8 + 6, color: `hsl(${Math.random() * 360}, 100%, 50%)`, angle: Math.random() * 360, spin: (Math.random() - 0.5) * 10 });
    }
    confettis.forEach(c => {
        c.x += c.vx; c.y += c.vy; c.angle += c.spin;
        ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(c.angle * Math.PI / 180); ctx.fillStyle = c.color; ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size * 0.6); ctx.restore();
        if (c.y > canvas.height) { c.y = -10; c.x = Math.random() * canvas.width; }
    });
}

function drawJoystick() {
    if (!joystick.active) return;
    ctx.save(); ctx.globalAlpha = 0.5; ctx.beginPath(); ctx.arc(joystick.startX, joystick.startY, joystick.maxRadius, 0, Math.PI * 2); ctx.fillStyle = '#555'; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
    let dx = joystick.currentX - joystick.startX; let dy = joystick.currentY - joystick.startY; const dist = Math.hypot(dx, dy);
    if (dist > joystick.maxRadius) { dx = (dx / dist) * joystick.maxRadius; dy = (dy / dist) * joystick.maxRadius; }
    ctx.beginPath(); ctx.arc(joystick.startX + dx, joystick.startY + dy, 20, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill(); ctx.restore();
}

function gameLoop() {
    if (gameState === 'gameover') {
        if (player.hp > 0) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            gems.forEach(g => g.draw()); healDrops.forEach(h => h.draw()); projectiles.forEach(p => p.draw()); effects.forEach(e => e.draw()); enemies.forEach(e => e.draw());
            tethers.forEach(t => t.draw()); summons.forEach(s => s.draw()); damageTexts.forEach(dt => dt.draw());
            ctx.font = '30px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('🧙', player.x, player.y);
            drawConfetti(); 
        }
        requestAnimationFrame(gameLoop); return;
    }

    if (gameState !== 'playing') {
        if(gameState === 'paused' || gameState === 'start') requestAnimationFrame(gameLoop); return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let moveX = 0; let moveY = 0;
    if (keys['a'] || keys['arrowleft']) moveX -= 1; if (keys['d'] || keys['arrowright']) moveX += 1;
    if (keys['w'] || keys['arrowup']) moveY -= 1; if (keys['s'] || keys['arrowdown']) moveY += 1;
    if (joystick.active) {
        const jx = joystick.currentX - joystick.startX; const jy = joystick.currentY - joystick.startY; const dist = Math.hypot(jx, jy);
        if (dist > 5) { moveX = jx / dist; moveY = jy / dist; }
    }
    if (moveX !== 0 || moveY !== 0) {
        const dist = Math.hypot(moveX, moveY); const nx = (moveX / dist) * player.speed; const ny = (moveY / dist) * player.speed;
        if (player.x + nx > player.size && player.x + nx < canvas.width - player.size) player.x += nx;
        if (player.y + ny > player.size && player.y + ny < canvas.height - player.size) player.y += ny;
    }

    fireSkill();
    frameCount++;
    
    let stopSpawning = false;
    if (player.level >= 10) {
        level10Frames += bossIsDead ? 2 : 1; stopSpawning = level10Frames >= 2400;
        let spawnRate = bossIsDead ? 8 : 16;
        if (!stopSpawning) {
            if (frameCount % spawnRate === 0) enemies.push(new Enemy(1 + player.level * 0.3, 'normal'));
            if (frameCount % (spawnRate * 4) === 0) enemies.push(new Enemy(1 + player.level * 0.3, 'mini'));
        }
    } else {
        let spawnRate = Math.max(15, 80 - player.level * 6);
        if (frameCount % spawnRate === 0) enemies.push(new Enemy(1 + player.level * 0.3, 'normal'));
        if (player.level >= 5 && frameCount % (spawnRate * 4) === 0) enemies.push(new Enemy(1 + player.level * 0.3, 'mini'));
    }

    if (gems.length > 200) gems.shift(); if (healDrops.length > 50) healDrops.shift();

    for (let i = gems.length - 1; i >= 0; i--) if (!gems[i].update()) gems.splice(i, 1);
    for (let i = healDrops.length - 1; i >= 0; i--) if (!healDrops[i].update()) healDrops.splice(i, 1);
    for (let i = projectiles.length - 1; i >= 0; i--) if (!projectiles[i].update()) projectiles.splice(i, 1);
    for (let i = effects.length - 1; i >= 0; i--) if (!effects[i].update()) effects.splice(i, 1);
    for (let i = damageTexts.length - 1; i >= 0; i--) if (!damageTexts[i].update()) damageTexts.splice(i, 1);
    
    for (let i = summons.length - 1; i >= 0; i--) {
        if (!summons[i].update()) {
            for(let e of enemies) if (e.tauntedBy === summons[i]) e.tauntedBy = null;
            summons.splice(i, 1);
        }
    }
    for (let i = tethers.length - 1; i >= 0; i--) if (!tethers[i].update()) tethers.splice(i, 1);

    gems.forEach(g => g.draw()); healDrops.forEach(h => h.draw()); projectiles.forEach(p => p.draw()); effects.forEach(e => e.draw());
    tethers.forEach(t => t.draw()); summons.forEach(s => s.draw()); 

    for (let i = enemies.length - 1; i >= 0; i--) {
        enemies[i].update(); enemies[i].draw();
        if (enemies[i].hp <= 0) {
            if (enemies[i].type === 'boss') bossIsDead = true;
            let gemCount = enemies[i].type === 'boss' ? 30 : (enemies[i].type === 'mini' ? 5 : 1);
            for (let g = 0; g < gemCount; g++) gems.push(new Gem(enemies[i].x + (Math.random() * 20 - 10), enemies[i].y + (Math.random() * 20 - 10)));
            if (enemies[i].type === 'normal') {
                normalKillCount++;
                if (normalKillCount >= 10) { healDrops.push(new HealDrop(enemies[i].x, enemies[i].y)); normalKillCount = 0; }
            }
            enemies.splice(i, 1);
        }
    }
    
    damageTexts.forEach(dt => dt.draw());

    ctx.font = '30px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('🧙', player.x, player.y);
    ctx.fillStyle = '#F44336'; ctx.fillRect(player.x - 15, player.y - 25, 30, 5);
    ctx.fillStyle = '#4CAF50'; ctx.fillRect(player.x - 15, player.y - 25, 30 * (player.hp / player.maxHp), 5);

    drawJoystick();

    if (player.level >= 10 && stopSpawning && enemies.length === 0) gameOver(true);

    requestAnimationFrame(gameLoop);
}
</script>
