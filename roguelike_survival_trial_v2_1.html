<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Roguelike 生存：極限試煉 v6.1 (召喚法術實裝版)</title>
<style>
    body { margin: 0; overflow: hidden; background-color: #222; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; touch-action: none; }
    canvas { display: block; }
    #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.85); padding: 30px; border-radius: 10px; border: 2px solid #555; text-align: center; pointer-events: auto; width: 85%; max-width: 450px; box-sizing: border-box; }
    .btn { display: inline-block; background: #4CAF50; color: white; padding: 10px 15px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: background 0.3s; }
    .btn:hover { background: #45a049; }
    .btn-upgrade { background: #2196F3; width: 100%; margin: 10px 0; display: block; }
    .btn-upgrade:hover { background: #1976D2; }
    .btn-special { background: #ff9800; font-weight: bold; text-shadow: 1px 1px 2px black; }
    .btn-special:hover { background: #e68a00; }
    .btn-summoner { background: #9C27B0; } 
    .btn-summoner:hover { background: #7B1FA2; }
    #exp-bar-container { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 80%; height: 20px; background: #333; border-radius: 10px; border: 2px solid #777; }
    #exp-bar { height: 100%; width: 0%; background: #4CAF50; border-radius: 8px; transition: width 0.2s; }
    #status { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); font-size: 18px; text-shadow: 1px 1px 2px black; }
    .hidden { display: none !important; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div id="exp-bar-container" class="hidden">
        <div id="exp-bar"></div>
    </div>
    <div id="status" class="hidden">等級: 0 / 10</div>

    <div id="start-screen" class="panel">
        <h2>Roguelike 生存試煉</h2>
        <p>請選擇你的初始技能：</p>
        <button class="btn" onclick="startGame('missile')">魔法追蹤彈</button>
        <button class="btn" onclick="startGame('frost')">冰霜法環</button>
        <button class="btn btn-summoner" onclick="startGame('summoner')">召喚法術</button>
    </div>

    <div id="upgrade-screen" class="panel hidden">
        <h2 id="upgrade-title">技能強化！</h2>
        <div id="upgrade-options"></div>
    </div>

    <div id="game-over-screen" class="panel hidden">
        <h2 id="end-title">遊戲結束</h2>
        <button class="btn" onclick="location.reload()">重新開始</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameState = 'start';
let keys = {};
let frameCount = 0;
let normalKillCount = 0; 
let confettis = []; 

let enemies = [];
let gems = [];
let healDrops = []; 
let projectiles = [];
let effects = [];
let damageTexts = []; 
let minions = []; 
let markedEnemy = null; 

let level10Frames = 0;
let bossIsDead = false;

const player = {
    x: canvas.width / 2, y: canvas.height / 2,
    size: 15, speed: 4, hp: 100, maxHp: 100,
    exp: 0, nextExp: 5, level: 0,
    skill: null, skillStats: {}
};

const joystick = {
    active: false,
    startX: 0, startY: 0,
    currentX: 0, currentY: 0,
    maxRadius: 50
};

const skillDefinitions = {
    missile: {
        id: 'missile', name: '魔法追蹤彈',
        cooldown: 45, currentCooldown: 0, count: 1, speed: 5, damage: 15, turnSpeed: 2.0, size: 12, splitCount: 0, isSpecial: false, 
        upgrades: [
            { id: 'u1', desc: '魔法追蹤彈+1', apply: (s) => s.count += 1 },
            { id: 'u2', desc: '增加攻擊頻度', apply: (s) => s.cooldown = (player.level === 10) ? Math.max(2, s.cooldown - 10) : Math.max(10, s.cooldown - 10) },
            { id: 'u3', desc: '擊中後分裂', apply: (s) => s.splitCount += 2 }
        ],
        specialUpgrade: { id: 's1', desc: '超級強化：魔力爆發 (攻擊力提升2.5倍)', apply: (s) => { s.damage *= 2.5; s.isSpecial = true; } }
    },
    frost: {
        id: 'frost', name: '冰霜法環',
        cooldown: 120, currentCooldown: 0, radius: 50, duration: 60, damage: 40, isSpecial: false,
        upgrades: [
            { id: 'u1', desc: '擴大法環半徑', apply: (s) => s.radius += 30 },
            { id: 'u2', desc: '增加發動頻率', apply: (s) => s.cooldown = (player.level === 10) ? Math.max(10, s.cooldown - 10) : Math.max(60, s.cooldown - 10) }, 
            { id: 'u3', desc: '增加冰環停留時間', apply: (s) => s.duration += 24 } 
        ],
        specialUpgrade: { id: 's1', desc: '超級強化：絕對零度 (命中瞬間結凍)', apply: (s) => s.isSpecial = true }
    },
    summoner: {
        id: 'summoner', name: '召喚法術', // 【更新】名稱修正
        controlRate: 0.25, 
        houndMax: 3,
        houndCooldown: 300, 
        currentHoundCooldown: 300,
        atkBonus: 0,
        spdBonus: 1.0,
        isSpecial: false,
        upgrades: [
            { id: 'u1', desc: '洗腦加速 (支配速率+5%)', apply: (s) => s.controlRate += 0.05 },
            { id: 'u2', desc: '獵犬繁衍 (上限+1，冷卻-0.5秒)', apply: (s) => { s.houndMax += 1; s.houndCooldown = Math.max(60, s.houndCooldown - 30); } },
            { id: 'u3', desc: '狂熱血統 (召喚物攻擊力+3，跑速增加)', apply: (s) => { s.atkBonus += 3; s.spdBonus += 0.2; } }
        ],
        specialUpgrade: { id: 's1', desc: '超級強化：惡魔契約 (支配變大惡魔，附帶範圍傷害)', apply: (s) => s.isSpecial = true }
    }
};

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

canvas.addEventListener('touchstart', e => {
    if (gameState !== 'playing') return;
    e.preventDefault();
    const touch = e.changedTouches[0];
    joystick.active = true;
    joystick.startX = touch.clientX;
    joystick.startY = touch.clientY;
    joystick.currentX = touch.clientX;
    joystick.currentY = touch.clientY;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
    if (!joystick.active) return;
    e.preventDefault();
    const touch = e.changedTouches[0];
    joystick.currentX = touch.clientX;
    joystick.currentY = touch.clientY;
}, { passive: false });

const stopJoystick = () => joystick.active = false;
canvas.addEventListener('touchend', stopJoystick);
canvas.addEventListener('touchcancel', stopJoystick);

function startGame(skillId) {
    player.skill = skillId;
    player.skillStats = JSON.parse(JSON.stringify(skillDefinitions[skillId]));
    player.skillStats.upgrades = skillDefinitions[skillId].upgrades;
    player.skillStats.specialUpgrade = skillDefinitions[skillId].specialUpgrade;
    
    player.x = canvas.width / 2;
    player.y = canvas.height / 2;
    
    // 【更新】所有玩家血量統一為 100
    player.maxHp = 100;
    player.hp = 100;
    
    normalKillCount = 0; 
    healDrops = []; 
    confettis = [];
    damageTexts = [];
    enemies = [];
    projectiles = [];
    effects = [];
    minions = [];
    markedEnemy = null;
    level10Frames = 0;
    bossIsDead = false;
    
    if (skillId === 'summoner') minions.push(new Minion(player.x, player.y, 'hound')); 
    
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('exp-bar-container').classList.remove('hidden');
    document.getElementById('status').classList.remove('hidden');
    gameState = 'playing';
    requestAnimationFrame(gameLoop);
}

class DamageText {
    constructor(x, y, damage, color) {
        this.x = x + (Math.random() - 0.5) * 30; 
        this.y = y + (Math.random() - 0.5) * 10;
        this.damage = Math.round(damage);
        this.color = color;
        this.life = 35; 
        this.maxLife = 35;
        this.vy = -1.5 - Math.random(); 
    }
    update() {
        this.y += this.vy;
        this.life--;
        return this.life > 0;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.life / this.maxLife;
        ctx.fillStyle = this.color;
        ctx.font = 'bold 18px Arial';
        ctx.textAlign = 'center';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.strokeText(this.damage, this.x, this.y);
        ctx.fillText(this.damage, this.x, this.y);
        ctx.restore();
    }
}

class Enemy {
    constructor(hpMult, type = 'normal') {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.max(canvas.width, canvas.height) / 2 + 50;
        this.x = player.x + Math.cos(angle) * dist;
        this.y = player.y + Math.sin(angle) * dist;
        this.type = type;
        
        let baseSpeed = 1.5 + Math.random() * 1;
        let hpScale = 1.2;
        if (player.level >= 5) {
            let progress = Math.min(4, player.level - 5) / 4; 
            hpScale = 1.2 * (1 + 0.5 * progress); 
        }

        if (type === 'boss') {
            this.size = 35; 
            this.speed = 3.0; 
            this.hp = 30 * hpMult * hpScale * 10.0; 
            this.emoji = '👻';
        } else if (type === 'mini') {
            this.size = 18;
            this.speed = baseSpeed * 0.6;
            this.hp = 30 * hpMult * hpScale * 2.0;
            this.emoji = '👹';
        } else {
            this.size = 12 + Math.random() * 5;
            this.speed = baseSpeed;
            this.hp = 30 * hpMult * hpScale;
            this.emoji = '👾';
        }
        
        this.maxHp = this.hp;
        this.baseSpeed = this.speed; 
        this.frozenTimer = 0;
        this.frostHitCount = 0;
        this.slowMultiplier = 1.0;
        
        this.controlValue = 0;
        this.tauntedBy = null; 
    }
    update() {
        if (this.frozenTimer > 0) {
            this.frozenTimer--;
            this.slowMultiplier = 1.0; 
            return;
        }
        
        let targetX = player.x;
        let targetY = player.y;
        let isTaunted = false;
        
        if (this.tauntedBy && this.tauntedBy.hp > 0) {
            targetX = this.tauntedBy.x;
            targetY = this.tauntedBy.y;
            isTaunted = true;
        } else {
            this.tauntedBy = null; 
        }

        const dx = targetX - this.x;
        const dy = targetY - this.y;
        const distSq = dx * dx + dy * dy; 
        const dist = Math.sqrt(distSq);
        
        let actualSpeed = this.baseSpeed * this.slowMultiplier;
        let hitDist = isTaunted ? (this.size + this.tauntedBy.size) : (player.size + this.size);
        
        if (dist > hitDist * 0.5) {
            this.x += (dx / dist) * actualSpeed;
            this.y += (dy / dist) * actualSpeed;
        }
        
        this.slowMultiplier = 1.0;
        
        if (distSq < hitDist * hitDist) {
            if (isTaunted) {
                this.tauntedBy.hp -= 0.5; 
            } else {
                player.hp -= 0.5; 
                if (player.hp <= 0) gameOver(false);
            }
        }
    }
    draw() {
        if (this.frozenTimer > 0) {
            ctx.fillStyle = 'rgba(0, 255, 255, 0.4)';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 1.5, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.font = `${this.size * 2}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.emoji, this.x, this.y); 

        if (this.type === 'boss' && this.frostHitCount > 0) {
            ctx.font = `16px Arial`;
            ctx.textAlign = 'center';
            let mark = this.frostHitCount === 1 ? '❄️' : '❄️❄️';
            ctx.fillText(mark, this.x, this.y - this.size - 8);
        }
        
        if (this === markedEnemy) {
            ctx.fillStyle = '#222';
            ctx.fillRect(this.x - 20, this.y - this.size - 15, 40, 6);
            ctx.fillStyle = '#9C27B0'; 
            ctx.fillRect(this.x - 20, this.y - this.size - 15, 40 * (this.controlValue / this.maxHp), 6);
            ctx.font = `20px Arial`;
            ctx.fillText('👁️', this.x, this.y - this.size - 25);
        }
    }
}

class Minion {
    constructor(x, y, type, baseEnemy = null) {
        this.x = x; 
        this.y = y;
        this.type = type;
        this.target = null;
        this.atkTimer = 0;
        
        const s = player.skillStats;
        
        if (type === 'hound') {
            this.size = 12;
            this.maxHp = 100;
            this.hp = 100;
            this.speed = 3.5 * s.spdBonus;
            this.damage = 12 + s.atkBonus;
            this.emoji = '🐕';
        } else if (type === 'demon') {
            this.size = baseEnemy.size * 1.5;
            this.maxHp = baseEnemy.maxHp * 3;
            this.hp = this.maxHp;
            this.speed = baseEnemy.baseSpeed * 1.2 * s.spdBonus;
            this.damage = 30 + s.atkBonus; 
            this.emoji = '😈';
            this.cleaveRadius = 60; 
        } else {
            this.size = baseEnemy.size;
            this.maxHp = baseEnemy.maxHp;
            this.hp = this.maxHp;
            this.speed = baseEnemy.baseSpeed * s.spdBonus;
            this.damage = (baseEnemy.type === 'mini' ? 20 : 10) + s.atkBonus;
            this.emoji = baseEnemy.emoji;
        }
    }
    
    update() {
        if (this.target) {
            if (this.target.hp <= 0 || this.target === markedEnemy || (this.target.tauntedBy !== this && this.target.tauntedBy !== null)) {
                if (this.target.tauntedBy === this) this.target.tauntedBy = null;
                this.target = null;
            }
        }
        
        if (!this.target) {
            let closest = null; 
            let minDistSq = Infinity;
            for (let i = 0; i < enemies.length; i++) {
                let e = enemies[i];
                if (e === markedEnemy || e.tauntedBy !== null) continue;
                
                const dx = e.x - this.x;
                const dy = e.y - this.y;
                const dSq = dx * dx + dy * dy; 
                if (dSq < minDistSq) { minDistSq = dSq; closest = e; }
            }
            if (closest) {
                this.target = closest;
                closest.tauntedBy = this; 
            }
        }
        
        if (this.target) {
            const dx = this.target.x - this.x;
            const dy = this.target.y - this.y;
            const distSq = dx * dx + dy * dy; 
            const dist = Math.sqrt(distSq);
            const hitDist = this.size + this.target.size;
            
            if (dist > hitDist * 0.8) {
                this.x += (dx / dist) * this.speed;
                this.y += (dy / dist) * this.speed;
            }
            
            if (this.atkTimer > 0) this.atkTimer--;
            if (distSq <= hitDist * hitDist && this.atkTimer <= 0) {
                this.target.hp -= this.damage;
                damageTexts.push(new DamageText(this.target.x, this.target.y, this.damage, '#a1ff8a')); 
                
                if (this.type === 'demon') {
                    for (let i = 0; i < enemies.length; i++) {
                        let e = enemies[i];
                        if (e === this.target) continue;
                        let edx = e.x - this.x;
                        let edy = e.y - this.y;
                        if (edx * edx + edy * edy < this.cleaveRadius * this.cleaveRadius) {
                            e.hp -= this.damage * 0.5; 
                            damageTexts.push(new DamageText(e.x, e.y, this.damage * 0.5, '#ff5555'));
                        }
                    }
                    ctx.fillStyle = 'rgba(255, 50, 50, 0.4)';
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.cleaveRadius, 0, Math.PI*2); ctx.fill();
                }
                
                this.atkTimer = 30; 
            }
        }
        
        if (this.type !== 'hound') {
            this.hp -= (this.maxHp * 0.05) / 60;
        }
        
        if (this.hp <= 0 && this.target && this.target.tauntedBy === this) {
            this.target.tauntedBy = null;
        }
        
        return this.hp > 0;
    }
    
    draw() {
        if (this.type === 'demon') {
            ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size * 1.3, 0, Math.PI*2); ctx.fill();
        }
        
        ctx.font = `${this.size * 2}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        if (this.type === 'converted') {
            ctx.fillStyle = 'rgba(100, 255, 100, 0.4)';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        }
        
        ctx.fillText(this.emoji, this.x, this.y); 
        
        ctx.fillStyle = '#F44336';
        ctx.fillRect(this.x - 10, this.y + this.size + 2, 20, 4);
        ctx.fillStyle = '#4CAF50';
        ctx.fillRect(this.x - 10, this.y + this.size + 2, 20 * (Math.max(0, this.hp) / this.maxHp), 4);
    }
}

// 魔法追蹤彈的完整實作
class Projectile {
    constructor(x, y, target, stats, isSplit = false) {
        this.x = x; this.y = y; this.target = target; this.stats = stats; this.speed = stats.speed; this.isSpecial = stats.isSpecial; this.hitEnemies = new Set(); this.isSplit = isSplit;
        this.damage = isSplit ? stats.damage * 0.40 : stats.damage; this.size = isSplit ? 3.5 : (stats.size || 12); this.pierce = 1; 
        this.turnSpeedRad = isSplit ? (3.0 * (Math.PI / 180)) : (stats.turnSpeed * (Math.PI / 180)); 
        if (this.target) this.angle = Math.atan2(this.target.y - this.y, this.target.x - this.x); else this.angle = -Math.PI / 2;
        if (!isSplit) this.angle += (Math.random() - 0.5) * 0.6;
        this.vx = Math.cos(this.angle) * this.speed; this.vy = Math.sin(this.angle) * this.speed;
    }
    update() {
        if (this.x < -50 || this.x > canvas.width + 50 || this.y < -50 || this.y > canvas.height + 50) return false;
        if (!this.target || this.target.hp <= 0) {
            let closest = null; let minDistSq = Infinity;
            for (let i = 0; i < enemies.length; i++) {
                let e = enemies[i];
                if (e.hp <= 0 || this.hitEnemies.has(e)) continue;
                const dx = e.x - this.x; const dy = e.y - this.y; const dSq = dx * dx + dy * dy; 
                if (dSq < minDistSq) { minDistSq = dSq; closest = e; }
            }
            this.target = closest;
        }
        if (this.target) {
            const targetAngle = Math.atan2(this.target.y - this.y, this.target.x - this.x);
            let angleDiff = targetAngle - this.angle;
            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2; while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
            if (angleDiff > this.turnSpeedRad) angleDiff = this.turnSpeedRad; else if (angleDiff < -this.turnSpeedRad) angleDiff = -this.turnSpeedRad;
            this.angle += angleDiff; this.vx = Math.cos(this.angle) * this.speed; this.vy = Math.sin(this.angle) * this.speed;
        } 
        this.x += this.vx; this.y += this.vy;
        for (let i = 0; i < enemies.length; i++) {
            let e = enemies[i]; if (e.hp <= 0 || this.hitEnemies.has(e)) continue;
            const distSq = (e.x - this.x)**2 + (e.y - this.y)**2; const hitDist = e.size + this.size;
            if (distSq < hitDist * hitDist) {
                let actualDamage = (e.type === 'boss') ? this.damage * 0.65 : this.damage;
                e.hp -= actualDamage; this.hitEnemies.add(e);
                let textColor = this.isSplit ? ((e.type === 'boss') ? '#e8dfb5' : '#ffffcc') : ((e.type === 'boss') ? '#ffaa00' : '#ffea00');
                damageTexts.push(new DamageText(e.x, e.y, actualDamage, textColor));
                if (!this.isSplit && this.stats.splitCount > 0 && this.hitEnemies.size === 1) {
                    for (let j = 0; j < this.stats.splitCount; j++) {
                        let splitProj = new Projectile(this.x + (Math.random()-0.5)*20, this.y + (Math.random()-0.5)*20, null, this.stats, true);
                        splitProj.hitEnemies.add(e); splitProj.angle = this.angle + (j - (this.stats.splitCount - 1) / 2) * 0.4; 
                        splitProj.vx = Math.cos(splitProj.angle) * splitProj.speed; splitProj.vy = Math.sin(splitProj.angle) * splitProj.speed;
                        projectiles.push(splitProj);
                    }
                }
                this.pierce--; if (this.pierce <= 0) return false; 
            }
        }
        return true;
    }
    draw() {
        if (this.isSpecial) { ctx.fillStyle = this.isSplit ? 'rgba(255, 165, 0, 0.3)' : 'rgba(255, 69, 0, 0.4)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size * 1.6, 0, Math.PI * 2); ctx.fill(); }
        ctx.font = this.isSplit ? '16px Arial' : '24px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(this.isSplit ? '✨' : '⭐️', this.x, this.y);
    }
}

// 冰霜法環的完整實作
class FrostEffect {
    constructor(x, y, stats) {
        this.x = x; this.y = y; this.maxRadius = stats.radius; this.radius = 0; this.duration = stats.duration; this.maxDuration = stats.duration; 
        this.damage = stats.damage; this.isSpecial = stats.isSpecial; this.processedEnemies = new Set(); 
    }
    update() {
        if (this.radius < this.maxRadius) this.radius += 8; this.duration--; let elapsedFrames = this.maxDuration - this.duration;
        for (let i = 0; i < enemies.length; i++) {
            let e = enemies[i]; if (e.hp <= 0) continue; 
            const distSq = (e.x - this.x)**2 + (e.y - this.y)**2; 
            if (distSq < this.radius * this.radius) {
                e.slowMultiplier = (e.type === 'boss') ? 0.8 : 0.6; 
                if (!this.processedEnemies.has(e)) {
                    this.processedEnemies.add(e); e.hp -= this.damage;
                    damageTexts.push(new DamageText(e.x, e.y, this.damage, '#00ffff'));
                    if (this.isSpecial) {
                        if (e.type === 'boss') {
                            if (!this.hitBossesThisCast) this.hitBossesThisCast = new Set();
                            if (!this.hitBossesThisCast.has(e)) {
                                this.hitBossesThisCast.add(e); e.frostHitCount++;
                                if (e.frostHitCount >= 3) { e.frozenTimer = 10; e.frostHitCount = 0; }
                            }
                        } else e.frozenTimer = 10; 
                    }
                }
                if (elapsedFrames > 0 && elapsedFrames % 4 === 0) { e.hp -= 1; damageTexts.push(new DamageText(e.x, e.y, 1, '#cceeff')); }
            }
        }
        return this.duration > 0;
    }
    draw() {
        ctx.save(); ctx.globalAlpha = Math.max(0, this.duration / this.maxDuration); ctx.strokeStyle = 'rgb(150, 200, 255)'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.stroke();
        ctx.font = `${Math.max(10, this.radius * 1.2)}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('❄️', this.x, this.y); ctx.restore();
    }
}

class Gem {
    constructor(x, y) {
        this.x = x; this.y = y; this.size = 5;
    }
    update() {
        const dx = player.x - this.x;
        const dy = player.y - this.y;
        const distSq = dx * dx + dy * dy; 
        if (distSq < 6400) { this.x += dx * 0.1; this.y += dy * 0.1; }
        const hitDist = player.size + this.size;
        if (distSq < hitDist * hitDist) {
            player.exp++;
            updateUI();
            if (player.exp >= player.nextExp && player.level < 10) levelUp();
            return false;
        }
        return true;
    }
    draw() {
        ctx.fillStyle = '#4CAF50';
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
    }
}

class HealDrop {
    constructor(x, y) {
        this.x = x; this.y = y; this.size = 5;
    }
    update() {
        const dx = player.x - this.x;
        const dy = player.y - this.y;
        const distSq = dx * dx + dy * dy;
        if (distSq < 6400) { this.x += dx * 0.1; this.y += dy * 0.1; }
        const hitDist = player.size + this.size;
        if (distSq < hitDist * hitDist) {
            player.hp = Math.min(player.maxHp, player.hp + 20);
            return false; 
        }
        return true;
    }
    draw() {
        ctx.fillStyle = '#FF5252'; 
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
    }
}

function fireSkill() {
    const s = player.skillStats;
    
    if (player.skill === 'summoner') {
        let houndCount = minions.filter(m => m.type === 'hound').length;
        if (houndCount < s.houndMax) {
            s.currentHoundCooldown--;
            if (s.currentHoundCooldown <= 0) {
                minions.push(new Minion(player.x, player.y, 'hound'));
                s.currentHoundCooldown = s.houndCooldown;
            }
        }
        
        if (markedEnemy && markedEnemy.hp <= 0) markedEnemy = null;
        if (!markedEnemy || enemies.indexOf(markedEnemy) === -1) {
            let bestTarget = null;
            let maxHP = -1;
            for (let i = 0; i < enemies.length; i++) {
                if (enemies[i].type !== 'boss' && enemies[i].maxHp > maxHP) {
                    maxHP = enemies[i].maxHp;
                    bestTarget = enemies[i];
                }
            }
            if (bestTarget) {
                markedEnemy = bestTarget;
                if (markedEnemy.tauntedBy) {
                    markedEnemy.tauntedBy.target = null;
                    markedEnemy.tauntedBy = null;
                }
            }
        }
        
        if (markedEnemy) {
            markedEnemy.controlValue += markedEnemy.maxHp * (s.controlRate / 60);
            
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(markedEnemy.x, markedEnemy.y);
            ctx.strokeStyle = 'rgba(156, 39, 176, 0.5)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.restore();
            
            if (markedEnemy.controlValue >= markedEnemy.maxHp) {
                let minionType = s.isSpecial ? 'demon' : 'converted';
                minions.push(new Minion(markedEnemy.x, markedEnemy.y, minionType, markedEnemy));
                
                let index = enemies.indexOf(markedEnemy);
                if (index !== -1) enemies.splice(index, 1);
                
                markedEnemy = null;
            }
        }
        return; 
    }
    
    if (s.currentCooldown > 0) { s.currentCooldown--; return; }
    
    if (player.skill === 'missile') {
        let initialTarget = null;
        let minDistSq = Infinity;
        for (let i = 0; i < enemies.length; i++) {
            let e = enemies[i];
            if (e.hp <= 0 || e.x < 0 || e.x > canvas.width || e.y < 0 || e.y > canvas.height) continue;
            const dx = e.x - player.x;
            const dy = e.y - player.y;
            const dSq = dx * dx + dy * dy; 
            if (dSq < minDistSq) { minDistSq = dSq; initialTarget = e; }
        }

        for (let i = 0; i < s.count; i++) {
            let offsetX = (Math.random() - 0.5) * 50;
            let offsetY = (Math.random() - 0.5) * 50;
            projectiles.push(new Projectile(player.x + offsetX, player.y + offsetY, initialTarget, s, false));
        }
        s.currentCooldown = s.cooldown;
        
    } else if (player.skill === 'frost') {
        effects.push(new FrostEffect(player.x, player.y, s));
        s.currentCooldown = s.cooldown;
    }
}

function updateUI() {
    document.getElementById('exp-bar').style.width = `${(player.exp / player.nextExp) * 100}%`;
    document.getElementById('status').innerText = `進化等級: ${player.level} / 10`;
}

function levelUp() {
    joystick.active = false;
    gameState = 'paused';
    player.level++;
    
    player.hp = Math.min(player.maxHp, player.hp + (player.maxHp / 6));
    
    player.exp = 0;
    player.nextExp = Math.floor(player.nextExp * 1.5);
    updateUI();
    
    const screen = document.getElementById('upgrade-screen');
    const optionsDiv = document.getElementById('upgrade-options');
    optionsDiv.innerHTML = '';
    screen.classList.remove('hidden');

    const s = player.skillStats;

    if (player.level === 10) level10Frames = 0;

    if (player.level === 5) {
        document.getElementById('upgrade-title').innerText = "第 5 次進化：超級強化！";
        let choice = s.specialUpgrade;
        let btn = document.createElement('button');
        btn.className = 'btn btn-upgrade btn-special';
        btn.innerText = choice.desc;
        btn.onclick = () => {
            choice.apply(s);
            resumeGameAfterUpgrade();
        };
        optionsDiv.appendChild(btn);
        
    } else if (player.level === 10) {
        document.getElementById('upgrade-title').innerText = "第 10 次進化：終極覺醒！\n(將突破極限，獲得所有能力)";
        let choices = [...s.upgrades];
        let clickedCount = 0;
        choices.forEach(choice => {
            let btn = document.createElement('button');
            btn.className = 'btn btn-upgrade btn-special';
            btn.innerText = choice.desc;
            btn.onclick = () => {
                choice.apply(s);
                btn.classList.add('hidden');
                clickedCount++;
                if (clickedCount === choices.length) resumeGameAfterUpgrade(); 
            };
            optionsDiv.appendChild(btn);
        });
        
    } else {
        document.getElementById('upgrade-title').innerText = "技能強化！";
        
        let available = [...s.upgrades].filter(choice => {
            if (s.id === 'missile' && choice.id === 'u2' && s.cooldown <= 10) return false;
            if (s.id === 'frost' && choice.id === 'u2' && s.cooldown <= 60) return false;
            return true;
        });
        
        available.sort(() => 0.5 - Math.random());
        let choices = available.slice(0, 2);
        
        choices.forEach(choice => {
            let btn = document.createElement('button');
            btn.className = 'btn btn-upgrade';
            if (player.skill === 'summoner') btn.style.background = '#9C27B0';
            btn.innerText = choice.desc;
            btn.onclick = () => {
                choice.apply(s);
                resumeGameAfterUpgrade();
            };
            optionsDiv.appendChild(btn);
        });
    }
}

function resumeGameAfterUpgrade() {
    document.getElementById('upgrade-screen').classList.add('hidden');
    gameState = 'playing';
    
    if (player.level === 10) {
        document.getElementById('status').innerText = "最終波！肅清所有怪物以獲勝！";
        document.getElementById('status').style.color = "#FFEB3B";
        enemies.push(new Enemy(1 + player.level * 0.3, 'boss'));
    }
}

function gameOver(isWin) {
    joystick.active = false;
    gameState = 'gameover';
    document.getElementById('game-over-screen').classList.remove('hidden');
    document.getElementById('end-title').innerText = isWin ? "挑戰成功！你肅清了戰場！" : "挑戰失敗！";
    document.getElementById('end-title').style.color = isWin ? "#4CAF50" : "#F44336";
}

function drawConfetti() {
    if (confettis.length === 0) {
        for (let i = 0; i < 150; i++) {
            confettis.push({ x: Math.random() * canvas.width, y: Math.random() * -canvas.height, vx: (Math.random() - 0.5) * 4, vy: Math.random() * 3 + 2, size: Math.random() * 8 + 6, color: `hsl(${Math.random() * 360}, 100%, 50%)`, angle: Math.random() * 360, spin: (Math.random() - 0.5) * 10 });
        }
    }
    confettis.forEach(c => {
        c.x += c.vx; c.y += c.vy; c.angle += c.spin;
        ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(c.angle * Math.PI / 180); ctx.fillStyle = c.color; ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size * 0.6); ctx.restore();
        if (c.y > canvas.height) { c.y = -10; c.x = Math.random() * canvas.width; }
    });
}

function drawJoystick() {
    if (!joystick.active) return;
    ctx.save(); ctx.globalAlpha = 0.5; ctx.beginPath(); ctx.arc(joystick.startX, joystick.startY, joystick.maxRadius, 0, Math.PI * 2); ctx.fillStyle = '#555'; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
    let dx = joystick.currentX - joystick.startX; let dy = joystick.currentY - joystick.startY; const dist = Math.hypot(dx, dy);
    if (dist > joystick.maxRadius) { dx = (dx / dist) * joystick.maxRadius; dy = (dy / dist) * joystick.maxRadius; }
    ctx.beginPath(); ctx.arc(joystick.startX + dx, joystick.startY + dy, 20, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill(); ctx.restore();
}

function gameLoop() {
    if (gameState === 'gameover') {
        if (player.hp > 0) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            gems.forEach(g => g.draw());
            healDrops.forEach(h => h.draw()); 
            projectiles.forEach(p => p.draw());
            effects.forEach(e => e.draw());
            minions.forEach(m => m.draw()); 
            enemies.forEach(e => e.draw());
            damageTexts.forEach(dt => dt.draw());
            
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🧙', player.x, player.y);
            
            drawConfetti(); 
        }
        requestAnimationFrame(gameLoop);
        return;
    }

    if (gameState !== 'playing') {
        if(gameState === 'paused' || gameState === 'start') requestAnimationFrame(gameLoop);
        return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let moveX = 0; let moveY = 0;
    if (keys['a'] || keys['arrowleft']) moveX -= 1; if (keys['d'] || keys['arrowright']) moveX += 1;
    if (keys['w'] || keys['arrowup']) moveY -= 1; if (keys['s'] || keys['arrowdown']) moveY += 1;

    if (joystick.active) {
        const jx = joystick.currentX - joystick.startX; const jy = joystick.currentY - joystick.startY; const dist = Math.hypot(jx, jy);
        if (dist > 5) { moveX = jx / dist; moveY = jy / dist; }
    }

    if (moveX !== 0 || moveY !== 0) {
        const dist = Math.hypot(moveX, moveY);
        const nx = (moveX / dist) * player.speed; const ny = (moveY / dist) * player.speed;
        if (player.x + nx > player.size && player.x + nx < canvas.width - player.size) player.x += nx;
        if (player.y + ny > player.size && player.y + ny < canvas.height - player.size) player.y += ny;
    }

    fireSkill();

    frameCount++;
    
    let stopSpawning = false;
    if (player.level >= 10) {
        level10Frames += bossIsDead ? 2 : 1; 
        stopSpawning = level10Frames >= 2400;
        let spawnRate = bossIsDead ? 8 : 16;
        if (!stopSpawning) {
            if (frameCount % spawnRate === 0) enemies.push(new Enemy(1 + player.level * 0.3, 'normal'));
            if (frameCount % (spawnRate * 4) === 0) enemies.push(new Enemy(1 + player.level * 0.3, 'mini'));
        }
    } else {
        let spawnRate = Math.max(15, 80 - player.level * 6);
        if (frameCount % spawnRate === 0) enemies.push(new Enemy(1 + player.level * 0.3, 'normal'));
        if (player.level >= 5 && frameCount % (spawnRate * 4) === 0) enemies.push(new Enemy(1 + player.level * 0.3, 'mini'));
    }

    if (gems.length > 200) gems.shift();
    if (healDrops.length > 50) healDrops.shift();

    for (let i = gems.length - 1; i >= 0; i--) if (!gems[i].update()) gems.splice(i, 1);
    for (let i = healDrops.length - 1; i >= 0; i--) if (!healDrops[i].update()) healDrops.splice(i, 1);
    for (let i = projectiles.length - 1; i >= 0; i--) if (!projectiles[i].update()) projectiles.splice(i, 1);
    for (let i = effects.length - 1; i >= 0; i--) if (!effects[i].update()) effects.splice(i, 1);
    for (let i = damageTexts.length - 1; i >= 0; i--) if (!damageTexts[i].update()) damageTexts.splice(i, 1);
    for (let i = minions.length - 1; i >= 0; i--) if (!minions[i].update()) minions.splice(i, 1);

    gems.forEach(g => g.draw());
    healDrops.forEach(h => h.draw()); 
    projectiles.forEach(p => p.draw());
    effects.forEach(e => e.draw());
    minions.forEach(m => m.draw()); 

    for (let i = enemies.length - 1; i >= 0; i--) {
        enemies[i].update();
        enemies[i].draw();
        
        if (enemies[i].hp <= 0) {
            if (enemies[i].type === 'boss') bossIsDead = true;
            if (enemies[i] === markedEnemy) markedEnemy = null; 

            let gemCount = enemies[i].type === 'boss' ? 30 : (enemies[i].type === 'mini' ? 5 : 1);
            for (let g = 0; g < gemCount; g++) {
                gems.push(new Gem(enemies[i].x + (Math.random() * 20 - 10), enemies[i].y + (Math.random() * 20 - 10)));
            }
            
            if (enemies[i].type === 'normal') {
                normalKillCount++;
                if (normalKillCount >= 10) { healDrops.push(new HealDrop(enemies[i].x, enemies[i].y)); normalKillCount = 0; }
            }

            enemies.splice(i, 1);
        }
    }
    
    damageTexts.forEach(dt => dt.draw());

    ctx.font = '30px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🧙', player.x, player.y);
    
    ctx.fillStyle = '#F44336';
    ctx.fillRect(player.x - 15, player.y - 25, 30, 5);
    ctx.fillStyle = '#4CAF50';
    ctx.fillRect(player.x - 15, player.y - 25, 30 * (player.hp / player.maxHp), 5);

    drawJoystick();

    if (player.level >= 10 && stopSpawning && enemies.length === 0) {
        gameOver(true);
    }

    requestAnimationFrame(gameLoop);
}
</script>
